<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Meet Your Team — myDrSage</title>
<meta name="theme-color" content="#0D130F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0D130F; color: #F3EFE6;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  #progress-track { display: flex; gap: 6px; padding: 18px 20px 0; }
  .progress-dot { flex: 1; height: 3px; border-radius: 3px; background: rgba(243,239,230,0.1); }
  .progress-dot.done { background: var(--accent, #8FB596); }
  .progress-dot.active { background: var(--accent, #8FB596); opacity: 0.5; }

  #card-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 34px 24px 24px; text-align: center; }

  .avatar-lg {
    width: 84px; height: 84px; border-radius: 50%; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 30px; color: #F3EFE6;
    border: 3px solid rgba(201,167,92,0.3); position: relative;
  }
  .avatar-lg.speaking { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(243,239,230,0.2); } 50% { box-shadow: 0 0 0 12px rgba(243,239,230,0); } }

  .member-name { font-family: 'Fraunces', serif; font-weight: 500; font-size: 27px; margin-bottom: 4px; }
  .member-title { font-size: 13.5px; color: #8C9689; margin-bottom: 22px; }
  .intro-text { font-family: 'Fraunces', serif; font-style: italic; font-size: 17px; line-height: 1.55; color: #D6D8D2; margin-bottom: 26px; max-width: 380px; }

  .question-block { width: 100%; max-width: 400px; margin-bottom: 10px; }
  .question-label { font-size: 15px; font-weight: 600; margin-bottom: 18px; }

  .mic-btn {
    width: 84px; height: 84px; border-radius: 50%; border: none; margin: 0 auto 16px;
    background: var(--accent, #8FB596); display: flex; align-items: center; justify-content: center;
    font-size: 30px; cursor: pointer;
  }
  .mic-btn.listening { animation: pulse 1s ease-in-out infinite; background: #E86A5C; }
  .mic-status { font-size: 12.5px; color: #8C9689; margin-bottom: 18px; min-height: 16px; }

  .type-toggle { font-size: 12.5px; color: #8C9689; text-decoration: underline; background: none; border: none; cursor: pointer; }

  textarea {
    width: 100%; background: rgba(243,239,230,0.06); border: 1px solid rgba(243,239,230,0.14);
    border-radius: 12px; padding: 12px; color: #F3EFE6; font-family: inherit; font-size: 14px;
    min-height: 64px; resize: vertical; margin-bottom: 12px;
  }
  .option-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .option-chip {
    padding: 10px 16px; border-radius: 20px; border: 1px solid rgba(243,239,230,0.18);
    background: rgba(243,239,230,0.04); font-size: 13.5px; color: #D6D8D2; cursor: pointer;
  }
  .option-chip.selected { border-color: var(--accent, #8FB596); background: rgba(143,181,150,0.16); color: var(--accent, #8FB596); font-weight: 600; }

  .transcript-preview { font-size: 14px; color: var(--accent, #8FB596); font-style: italic; margin-bottom: 14px; min-height: 20px; }

  .sensitive-note {
    font-size: 12px; color: #8C9689; line-height: 1.5; margin-bottom: 16px;
    background: rgba(243,239,230,0.04); border-radius: 10px; padding: 10px 14px;
  }

  .auto-skip-note {
    font-size: 12px; color: #8C9689; background: rgba(243,239,230,0.04); border-radius: 10px;
    padding: 8px 12px; margin-top: 10px; max-width: 380px;
  }

  #nav-row { display: flex; gap: 12px; padding: 0 24px 34px; }
  .btn { flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .btn-primary { background: var(--accent, #8FB596); color: #0D130F; }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-skip { background: transparent; color: #8C9689; flex: 0 0 auto; padding: 15px 18px; }

  #done-screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
  .team-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .mini-av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #F3EFE6; }
</style>
</head>
<body>

  <a href="dashboard.html" style="position:fixed; top:16px; left:16px; z-index:50; font-size:13px; color:#8C9689; background:rgba(22,29,24,0.7); backdrop-filter:blur(8px); padding:6px 12px; border-radius:20px; text-decoration:none; border:1px solid rgba(243,239,230,0.1);">‹ Dashboard</a>

  <div id="start-gate" style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 30px; text-align:center;">
    <div style="width:72px; height:72px; border-radius:50%; background:linear-gradient(145deg,#A9CDAE,#5F7F63); margin-bottom:24px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; color:#F3EFE6;">DS</div>
    <div style="font-size:22px; font-weight:700; margin-bottom:10px;">Meet Your Team</div>
    <div style="font-size:14.5px; color:#8C9689; line-height:1.5; max-width:280px; margin-bottom:32px;">Dr. Sage and the team speak out loud as you go \u2014 your browser needs one tap first before any audio can play.</div>
    <button id="start-gate-btn" style="width:100%; max-width:280px; padding:16px; border-radius:14px; border:none; background:#8FB596; color:#0D130F; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;">Begin</button>
  </div>

  <div id="progress-track" style="display:none;"></div>
  <div id="card-area" style="display:none;"></div>
  <div id="nav-row" style="display:none;">
    <button class="btn btn-skip" id="skip-btn">Skip</button>
    <button class="btn btn-primary" id="next-btn">Continue</button>
  </div>

  <div id="done-screen">
    <div class="team-row" id="done-team-row"></div>
    <h2 style="font-size:22px; margin-bottom:10px;">Your team's ready.</h2>
    <p style="color:#8C9689; font-size:14.5px; max-width:320px; line-height:1.5; margin-bottom:28px;">Everything you shared gets folded into how Willow, Lotus, Hawthorn, and Basil actually think about your data — not just kept on file.</p>
    <button class="btn btn-primary" style="max-width:220px;" onclick="window.location.href='scores.html'">Go to Scores</button>
  </div>

<script>
const Team = {
  PROFILE_KEY: 'sh_team_profile',

  // Same real, deterministic safety net as lotus-chat.html \u2014
  // independent of the AI model, checked on every message sent
  // through any chat surface in this file. Deliberately errs
  // toward over-triggering, not under.
  CRISIS_PATTERNS: [
    /kill myself/i, /kill me\b/i, /want(ed)? to die/i, /wanna die/i,
    /end(ing)? my life/i, /ending it all/i, /not worth living/i,
    /better off dead/i, /no reason to live/i, /can'?t go on/i,
    /give up on life/i, /\bsuicid/i, /hurt(ing)? myself/i,
    /harm(ing)? myself/i, /self[\s-]?harm/i, /cutting myself/i,
    /take my own life/i, /don'?t want to (be here|exist)/i,
  ],

  checkForCrisisLanguage(text) {
    return Team.CRISIS_PATTERNS.some(function(re) { return re.test(text); });
  },

  todayKey() {
    return new Date().toISOString().slice(0, 10);
  },

  STEPS: [
    {
      key: 'drSage', name: 'Dr. Sage', title: 'Holistic Wellness Doctor',
      color: 'linear-gradient(145deg,#A9CDAE,#5F7F63)', accent: '#8FB596', voiceKey: 'drSage',
      intro: "I'm Dr. Sage. I will be your leader, but rest assured I have specialists monitoring every facet of your health. Let's take a couple of minutes to get acquainted, and then I want you to meet the team \u2014 I'll chat with you again once you're through.",
      questions: [
        { key: 'preferredName', label: 'What would you like to be called?', type: 'text' },
        { key: 'goal', label: "What's the main thing you're hoping to get out of this?", type: 'text' },
        { key: 'medicalHistory', label: 'Any diagnosed health conditions I should know about?', type: 'text', optional: true,
          sensitiveNote: 'Totally optional. This helps me know what to pay closer attention to \u2014 it\u2019s never used to diagnose anything.' },
        { key: 'familyHistory', label: 'Any family history of things like heart disease, diabetes, or similar?', type: 'text', optional: true,
          sensitiveNote: 'Also optional. Same idea \u2014 context for your team, not a medical record.' },
        { key: 'pastObstacle', label: "What's gotten in the way of this before, if anything?", type: 'text' },
      ],
    },
    {
      key: 'sleep', name: 'Willow', title: 'Sleep Coach',
      color: 'linear-gradient(145deg,#98A5DE,#4C5AA0)', accent: '#7E8FD1', voiceKey: 'sleep',
      intro: "{greeting}I'm Willow, your sleep coach. Getting a good night's rest is my only job, and most of the time, the most important one.",
      questions: [
        { key: 'bedtime', label: 'What time do you usually try to go to bed?', type: 'text' },
        { key: 'struggle', label: "What's your biggest sleep struggle?", type: 'options',
          options: ['Falling asleep', 'Staying asleep', 'Waking too early', "Not feeling rested"] },
        { key: 'waketime', label: 'And what time do you usually wake up?', type: 'text' },
        { key: 'caffeine', label: "What does your caffeine intake look like, and when's your last cup usually?", type: 'text' },
      ],
    },
    {
      key: 'stress', name: 'Lotus', title: 'Mindfulness Coach',
      color: 'linear-gradient(145deg,#CBA8D6,#7A5589)', accent: '#B98FC9', voiceKey: 'stress',
      intro: "{greeting}I'm Lotus, a true practitioner of yoga. Think of me as a spiritual guide through the everyday stresses of life. I promise to help take the edge off.",
      questions: [
        { key: 'experience', label: 'Any experience with meditation or yoga?', type: 'options',
          options: ['None', 'A little', 'Regular practice', 'Very experienced'] },
        { key: 'stressors', label: 'What tends to stress you out most?', type: 'text' },
        { key: 'manifestation', label: 'When stress hits, how does it usually show up \u2014 racing thoughts, physical tension, trouble sleeping, something else?', type: 'text' },
        { key: 'whatHelped', label: "Has anything actually helped before, even a little?", type: 'text' },
        { key: 'sleepAids', label: 'Do you use anything over-the-counter to help you sleep \u2014 melatonin, antihistamines, anything like that?', type: 'text', optional: true,
          sensitiveNote: 'Optional. This helps the team understand what\u2019s already part of your routine \u2014 never used to suggest starting or stopping anything.' },
      ],
    },
    {
      key: 'activity', name: 'Hawthorn', title: 'Exercise Coach',
      color: 'linear-gradient(145deg,#E6A183,#A85936)', accent: '#D9835C', voiceKey: 'activity',
      intro: "{greeting}I'm Hawthorn, your exercise guru. I will build a plan regardless of whether you are an athlete or novice. No matter your age, I will get you moving and improving.",
      questions: [
        { key: 'current', label: 'What does exercise currently look like for you?', type: 'text' },
        { key: 'goal', label: "What's one fitness goal you have right now?", type: 'text' },
        { key: 'limitations', label: 'Any injuries or physical limitations I should build around?', type: 'text', optional: true,
          sensitiveNote: 'Optional, but genuinely important \u2014 I\u2019ll never suggest something that works against an injury I know about.' },
        { key: 'equipment', label: 'What equipment or space do you actually have access to?', type: 'text' },
      ],
    },
    {
      key: 'nutrition', name: 'Basil', title: 'Nutrition Coach',
      color: 'linear-gradient(145deg,#B6D68A,#6B8F45)', accent: '#9FC96B', voiceKey: 'nutrition',
      intro: "{greeting}I'm Basil. I am all about food and nutrition. I know what you put in your body counts as much as anything. I will help along the way to a healthier you.",
      questions: [
        { key: 'restrictions', label: 'Any dietary preferences or restrictions?', type: 'text' },
        { key: 'hardest', label: "What's the hardest part of eating well for you?", type: 'text' },
        { key: 'pattern', label: 'How many meals do you typically eat in a day, and do you tend to snack?', type: 'text' },
        { key: 'cookingFor', label: 'Are you cooking just for yourself, or for others too?', type: 'text' },
      ],
    },
    {
      // Dr. Sage again, closing the loop \u2014 same key namespace is
      // deliberately avoided ('drSageClosing' not 'drSage') so this
      // never collides with his opening step's saved profile answers.
      // voiceKey stays 'drSage' so TTS still uses his real voice.
      key: 'drSageClosing', name: 'Dr. Sage', title: 'Holistic Wellness Doctor',
      color: 'linear-gradient(145deg,#A9CDAE,#5F7F63)', accent: '#8FB596', voiceKey: 'drSage',
      intro: "{greeting}That's the team. Willow, Lotus, Hawthorn, and Basil are all watching now, and everything you just shared is already helping them do their job. I'll be checking in as your reports come together \u2014 talk soon.",
      questions: [],
    },
  ],

  flatQuestions() {
    const flat = [];
    Team.STEPS.forEach(step => {
      step.questions.forEach(q => flat.push({ stepKey: step.key, ...q }));
    });
    return flat;
  },

  stepIndex: 0,
  questionIndexInStep: -1,
  answered: {},
  speechSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
  typedMode: false,
  currentTranscript: '',

  loadProfile() {
    try { return JSON.parse(localStorage.getItem(Team.PROFILE_KEY) || '{}'); }
    catch (e) { return {}; }
  },

  saveProfile(profile) {
    try { localStorage.setItem(Team.PROFILE_KEY, JSON.stringify(profile)); }
    catch (e) { /* non-critical */ }
  },

  saveAnswer(stepKey, qKey, value) {
    if (!value || !String(value).trim()) return;
    const profile = Team.loadProfile();
    profile[stepKey] = profile[stepKey] || {};
    profile[stepKey][qKey] = value;
    Team.saveProfile(profile);
    Team.answered[stepKey + '.' + qKey] = true;
  },

  async speak(text, voiceKey, avatarEl) {
    if (!text || !text.trim()) return;
    try {
      const res = await fetch('/.netlify/functions/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text.trim(), voiceKey }),
      });
      if (!res.ok) return;
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      if (avatarEl) avatarEl.classList.add('speaking');
      audio.addEventListener('ended', () => {
        URL.revokeObjectURL(url);
        if (avatarEl) avatarEl.classList.remove('speaking');
      });
      await audio.play();
    } catch (e) { /* spoken intro is a nice-to-have, never a blocker */ }
  },

  startListening(onResult, onError) {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) { onError('not_supported'); return null; }
    const rec = new SpeechRec();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-US';
    rec.onresult = (e) => onResult(e.results[0][0].transcript);
    rec.onerror = (e) => onError(e.error);
    rec.start();
    return rec;
  },

  async checkOverlap(justAnsweredLabel, justAnsweredValue) {
    const remaining = Team.flatQuestions().filter(function(q) {
      return q.type === 'text' && !Team.answered[q.stepKey + '.' + q.key];
    });
    if (!remaining.length) return {};

    const questionList = remaining.map(function(q) { return q.stepKey + '.' + q.key + ': "' + q.label + '"'; }).join('\n');
    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You detect when someone\u2019s answer to one question already contains a real answer to OTHER pending questions, so they never get asked twice. Only mark a question covered if the answer genuinely, specifically addresses it \u2014 not just loosely related. Never invent an answer that wasn\u2019t actually said. Respond with ONLY valid JSON, no markdown.',
          messages: [{ role: 'user', content: 'They were just asked: "' + justAnsweredLabel + '"\nThey answered: "' + justAnsweredValue + '"\n\nHere are other pending questions:\n' + questionList + '\n\nDoes their answer above ALSO genuinely answer any of these? Respond ONLY with JSON: {"covered": [{"key": "stepKey.questionKey", "extractedAnswer": "the answer, drawn only from what they actually said"}]} \u2014 empty array if none.' }],
          max_tokens: 300,
        }),
      });
      if (!res.ok) return {};
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      const result = {};
      (parsed.covered || []).forEach(function(c) {
        const parts = String(c.key || '').split('.');
        const stepKey = parts[0], qKey = parts[1];
        if (stepKey && qKey && c.extractedAnswer) result[c.key] = { stepKey: stepKey, qKey: qKey, value: c.extractedAnswer };
      });
      return result;
    } catch (e) {
      return {};
    }
  },

  renderProgress() {
    const track = document.getElementById('progress-track');
    track.innerHTML = Team.STEPS.map(function(s, i) {
      const cls = i < Team.stepIndex ? 'done' : (i === Team.stepIndex ? 'active' : '');
      return '<div class="progress-dot ' + cls + '"></div>';
    }).join('');
  },

  currentStep() { return Team.STEPS[Team.stepIndex]; },

  nextUnansweredQuestionIndex(step, fromIndex) {
    for (let i = fromIndex; i < step.questions.length; i++) {
      const q = step.questions[i];
      if (!Team.answered[step.key + '.' + q.key]) return i;
    }
    return -1;
  },

  renderIntro() {
    const step = Team.currentStep();
    if (!step) { Team.renderFinalAffirmation(); return; }
    document.documentElement.style.setProperty('--accent', step.accent);
    Team.renderProgress();
    Team.questionIndexInStep = -1;

    const initials = step.name[0];
    const personalizedIntro = Team.personalize(step.intro);
    document.getElementById('card-area').innerHTML =
      '<div class="avatar-lg" id="speaking-avatar" style="background:' + step.color + ';">' + initials + '</div>' +
      '<div class="member-name">' + step.name + '</div>' +
      '<div class="member-title">' + step.title + '</div>' +
      '<div class="intro-text">' + personalizedIntro + '</div>';
    document.getElementById('next-btn').textContent = 'Continue';
    document.getElementById('next-btn').disabled = false;

    Team.speak(personalizedIntro, step.voiceKey, document.getElementById('speaking-avatar'));
  },

  // Every specialist after Dr. Sage's own step can genuinely
  // greet by name, since he collects it first. Dr. Sage's own
  // OPENING line can't use this \u2014 the name isn't known yet when
  // it plays, since asking for it IS his first question.
  personalize(text) {
    const profile = Team.loadProfile();
    const name = profile?.drSage?.preferredName;
    const greeting = name && name.trim() ? name.trim() + ', ' : '';
    return text.replace('{greeting}', greeting);
  },

  renderQuestion() {
    const step = Team.currentStep();
    const q = step.questions[Team.questionIndexInStep];
    document.documentElement.style.setProperty('--accent', step.accent);

    const profile = Team.loadProfile();
    const existing = (profile[step.key] && profile[step.key][q.key]) || '';

    if (q.type === 'options') {
      const chips = q.options.map(function(opt) {
        const selected = existing === opt ? 'selected' : '';
        return '<div class="option-chip ' + selected + '" data-value="' + opt + '">' + opt + '</div>';
      }).join('');
      document.getElementById('card-area').innerHTML =
        '<div class="member-title" style="margin-bottom:20px;">' + step.name + '</div>' +
        '<div class="question-block"><div class="question-label">' + q.label + '</div>' +
        '<div class="option-row" id="option-row">' + chips + '</div></div>';
      document.querySelectorAll('.option-chip').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('.option-chip').forEach(function(c) { c.classList.remove('selected'); });
          el.classList.add('selected');
          Team.saveAnswer(step.key, q.key, el.dataset.value);
          document.getElementById('next-btn').disabled = false;
        });
      });
      document.getElementById('next-btn').disabled = !existing;
      document.getElementById('next-btn').textContent = 'Continue';
      return;
    }

    const micOrType = Team.typedMode
      ? '<textarea id="text-input" placeholder="Type your answer\u2026">' + existing + '</textarea>' +
        '<button class="type-toggle" id="mode-toggle">Use voice instead</button>'
      : '<button class="mic-btn" id="mic-btn">' + (Team.speechSupported ? '\u{1F3A4}' : '\u2328\uFE0F') + '</button>' +
        '<div class="mic-status" id="mic-status">' + (Team.speechSupported ? 'Tap to answer' : 'Voice not available on this device') + '</div>' +
        '<div class="transcript-preview" id="transcript-preview">' + existing + '</div>' +
        '<button class="type-toggle" id="mode-toggle">Type instead</button>';

    const sensitiveNoteHtml = q.sensitiveNote ? '<div class="sensitive-note">' + q.sensitiveNote + '</div>' : '';

    document.getElementById('card-area').innerHTML =
      '<div class="member-title" style="margin-bottom:20px;">' + step.name + '</div>' +
      '<div class="question-block"><div class="question-label">' + q.label + '</div>' +
      sensitiveNoteHtml + micOrType + '<div id="auto-skip-area"></div></div>';

    document.getElementById('mode-toggle').addEventListener('click', function() {
      Team.typedMode = !Team.typedMode;
      Team.renderQuestion();
    });

    if (Team.typedMode) {
      const ta = document.getElementById('text-input');
      ta.addEventListener('input', function() {
        Team.currentTranscript = ta.value;
        Team.saveAnswer(step.key, q.key, ta.value);
        document.getElementById('next-btn').disabled = q.optional ? false : !ta.value.trim();
      });
      document.getElementById('next-btn').disabled = q.optional ? false : !existing;
    } else if (Team.speechSupported) {
      document.getElementById('mic-btn').addEventListener('click', function() { Team.handleMicTap(step, q); });
      document.getElementById('next-btn').disabled = q.optional ? false : !existing;
    } else {
      document.getElementById('next-btn').disabled = q.optional ? false : true;
    }

    document.getElementById('next-btn').textContent = 'Continue';
  },

  async handleMicTap(step, q) {
    const btn = document.getElementById('mic-btn');
    const status = document.getElementById('mic-status');
    btn.classList.add('listening');
    status.textContent = 'Listening\u2026';

    Team.startListening(
      async function(transcript) {
        btn.classList.remove('listening');
        status.textContent = 'Got it';
        document.getElementById('transcript-preview').textContent = transcript;
        Team.currentTranscript = transcript;
        Team.saveAnswer(step.key, q.key, transcript);
        document.getElementById('next-btn').disabled = false;

        if (q.type === 'text') {
          const covered = await Team.checkOverlap(q.label, transcript);
          const keys = Object.keys(covered);
          if (keys.length) {
            keys.forEach(function(k) {
              const c = covered[k];
              Team.saveAnswer(c.stepKey, c.qKey, c.value);
            });
            const area = document.getElementById('auto-skip-area');
            if (area) area.innerHTML = '<div class="auto-skip-note">That also covered ' + keys.length + ' other question' + (keys.length > 1 ? 's' : '') + ' \u2014 you won\u2019t be asked ' + (keys.length > 1 ? 'those' : 'that') + ' again.</div>';
          }
        }
      },
      function(err) {
        btn.classList.remove('listening');
        status.textContent = err === 'not_supported' ? 'Voice not available \u2014 try typing' : 'Didn\u2019t catch that \u2014 try again';
      }
    );
  },

  followUpCount: {},
  MAX_FOLLOWUPS_PER_QUESTION: 5, // a safety ceiling against a genuine runaway loop, not a pacing/cost limit -- real depth matters more than speed here

  async advance(fromSkip) {
    const step = Team.currentStep();
    if (!step) return;

    // Real reaction, every real answer, and genuine iterative
    // probing \u2014 not capped at one extra question. Each specialist
    // keeps digging as long as there's real, specific value in
    // doing so, judged fresh each round, up to a safety ceiling
    // that exists only to prevent a genuine infinite loop, not to
    // limit depth.
    if (!fromSkip && Team.questionIndexInStep !== -1) {
      const q = step.questions[Team.questionIndexInStep];
      const qFullKey = step.key + '.' + q.key;
      const count = Team.followUpCount[qFullKey] || 0;

      if (q.type === 'text' && count < Team.MAX_FOLLOWUPS_PER_QUESTION) {
        const profile = Team.loadProfile();
        const answer = profile[step.key] && profile[step.key][q.key];
        if (answer && answer.trim()) {
          Team.followUpCount[qFullKey] = count + 1;
          const result = await Team.reactToAnswer(step, q.label, answer);
          if (result && result.reaction) {
            await Team.showReaction(step, result.reaction);
          }
          if (result && result.followUpQuestion) {
            Team.renderFollowUp(step, q, result.followUpQuestion, answer);
            return;
          }
        }
      } else if (q.type === 'options' && count === 0) {
        // Chip answers get a real, brief reaction too \u2014 the
        // actual "not a form" fix. Previously only free-text
        // answers got one, so every multiple-choice question
        // (a good chunk of onboarding) silently skipped straight
        // to the next card with zero acknowledgment. No follow-up
        // question here, deliberately \u2014 a discrete choice doesn't
        // need probing the way an open answer does, and the reuse
        // of followUpCount as a one-shot flag (rather than a new
        // state object) keeps this from re-firing if someone goes
        // back and reselects.
        const profile = Team.loadProfile();
        const answer = profile[step.key] && profile[step.key][q.key];
        if (answer) {
          Team.followUpCount[qFullKey] = 1;
          const result = await Team.reactToAnswer(step, q.label, answer);
          if (result && result.reaction) {
            await Team.showReaction(step, result.reaction);
          }
        }
      }
    }

    if (Team.questionIndexInStep === -1) {
      const next = Team.nextUnansweredQuestionIndex(step, 0);
      if (next === -1) { await Team.nextStep(); return; }
      Team.questionIndexInStep = next;
      Team.renderQuestion();
      return;
    }

    const next = Team.nextUnansweredQuestionIndex(step, Team.questionIndexInStep + 1);
    if (next === -1) { await Team.nextStep(); return; }
    Team.questionIndexInStep = next;
    Team.renderQuestion();
  },

  // Real, varied reaction in the specialist's own voice \u2014 the
  // actual "not a form" mechanism. Deliberately asks for
  // something SPECIFIC to what was said, not a generic "got it"
  // repeated 20 times, which would itself start to feel robotic.
  // Genuine iterative probing \u2014 keeps digging across multiple
  // rounds as long as there's real value in it, not capped at one
  // extra question. Each round sees the FULL cumulative answer
  // built up so far (original plus every prior follow-up
  // appended), so it judges real depth, not just whether one more
  // question was asked.
  async reactToAnswer(step, label, answer) {
    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: `You are ${step.name}, ${step.title}, listening to someone answer your real onboarding question \u2014 not silently recording it, actually reacting like a real person would. Your reaction must be SHORT (one sentence, sometimes a fragment), warm, and SPECIFIC to what they actually said \u2014 never a generic "got it" or "thanks" you could say to any answer. Then decide if another genuine follow-up would get real, valuable additional detail \u2014 real depth matters far more than speed here, so keep digging if there's genuinely more worth knowing, don't settle for a surface-level answer. Only stop asking once the answer is actually specific and complete \u2014 not after just one extra question by default. Respond ONLY with valid JSON, no markdown.`,
          messages: [{ role: 'user', content: `You asked: "${label}"\nHere's everything they've told you on this so far: "${answer}"\n\nRespond ONLY with JSON: {"reaction": "your short, specific, natural reaction to what they actually said", "needsFollowUp": true or false, "followUpQuestion": "one specific real follow-up, digging deeper into what's still missing \u2014 only include if needsFollowUp is true"}` }],
          max_tokens: 150,
        }),
      });
      if (!res.ok) return null;
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      return {
        reaction: parsed.reaction && String(parsed.reaction).trim() ? String(parsed.reaction).trim() : null,
        followUpQuestion: (parsed.needsFollowUp && parsed.followUpQuestion && String(parsed.followUpQuestion).trim()) ? String(parsed.followUpQuestion).trim() : null,
      };
    } catch (e) {
      return null; // never blocks the flow if this fails \u2014 just proceeds silently, same as before this feature existed
    }
  },

  // Brief, real moment \u2014 shown and spoken, then auto-advances
  // rather than requiring an extra tap for every single answer
  // across 22 questions, which would trade one kind of tedium for
  // another.
  showReaction(step, reactionText) {
    return new Promise(resolve => {
      const card = document.getElementById('card-area');
      const existing = card.querySelector('.question-block') || card;
      const reactionEl = document.createElement('div');
      reactionEl.style.cssText = 'font-size:13px; color:#8C9689; font-style:italic; margin:10px 0; text-align:center;';
      reactionEl.textContent = `\u201c${reactionText}\u201d`;
      existing.appendChild ? existing.appendChild(reactionEl) : card.appendChild(reactionEl);
      Team.speak(reactionText, step.voiceKey, null);
      setTimeout(resolve, 2200);
    });
  },

  renderFollowUp(step, q, followUpQuestion, originalAnswer) {
    document.documentElement.style.setProperty('--accent', step.accent);
    const card = document.getElementById('card-area');
    card.innerHTML = `
      <div class="member-title" style="margin-bottom:16px;">${step.name} wants to know more</div>
      <div class="question-block"><div class="question-label">${followUpQuestion}</div>
        <button class="mic-btn" id="followup-mic-btn">\u{1F3A4}</button>
        <div class="mic-status" id="followup-status">Tap to speak, or type below</div>
        <div class="transcript-preview" id="followup-preview"></div>
        <textarea id="followup-text" placeholder="Type your answer\u2026" style="width:100%; min-height:60px; background:rgba(243,239,230,0.06); border:1px solid rgba(243,239,230,0.14); border-radius:10px; padding:10px; color:#F3EFE6; font-family:inherit; font-size:13px; margin:12px 0;"></textarea>
      </div>
    `;
    document.getElementById('next-btn').textContent = 'Continue';
    document.getElementById('next-btn').disabled = true;

    const submitFollowUp = function(value) {
      if (!value || !value.trim()) return;
      const profile = Team.loadProfile();
      profile[step.key] = profile[step.key] || {};
      profile[step.key][q.key] = originalAnswer + ' \u2014 ' + value.trim();
      Team.saveProfile(profile);
      document.getElementById('next-btn').removeEventListener('click', onNextClick);
      document.getElementById('next-btn').addEventListener('click', Team.advance);
      Team.advance();
    };

    function onNextClick() { submitFollowUp(document.getElementById('followup-text').value); }
    document.getElementById('next-btn').removeEventListener('click', Team.advance);
    document.getElementById('next-btn').addEventListener('click', onNextClick);

    const textArea = document.getElementById('followup-text');
    textArea.addEventListener('input', function() {
      document.getElementById('next-btn').disabled = !textArea.value.trim();
    });

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
      document.getElementById('followup-mic-btn').addEventListener('click', function() {
        const status = document.getElementById('followup-status');
        status.textContent = 'Listening\u2026';
        const rec = new SpeechRec();
        rec.continuous = false; rec.interimResults = false; rec.lang = 'en-US';

          document.getElementById('followup-preview').textContent = transcript;
          textArea.value = transcript;
          document.getElementById('next-btn').disabled = false;
          status.textContent = 'Got it';
        };
        rec.onerror = function() { status.textContent = 'Didn\u2019t catch that \u2014 try typing'; };
        rec.start();
      });

  async nextStep() {
    // Leaving Dr. Sage's opening step is the one moment we know
    // the real stated goal but haven't yet decided who speaks
    // next \u2014 reorder the 4 specialists by relevance to it here,
    // once, before rendering the next intro. Never happens again
    // for later transitions (stepIndex > 0), and never blocks the
    // flow if it fails \u2014 falls back to the original order.
    if (Team.stepIndex === 0) {
      await Team.reorderSpecialistsByGoal();
    } else {
      // Every specialist walks away from their own step with a
      // real, immediately usable plan \u2014 not wait for a separate
      // page visit. Built from what's independent of ring data
      // (stated preferences and goals); real ring data arriving
      // later VALIDATES and refines these plans (see each real
      // plan page's own adherence/readiness/trend logic) rather
      // than gating them. Checked by KEY, not a fixed step index,
      // since the team order is now dynamic.
      const leavingKey = Team.currentStep().key;
      if (leavingKey === 'sleep') await Team.buildInitialSleepPlan();
      if (leavingKey === 'stress') await Team.buildInitialMindfulnessPlan();
      if (leavingKey === 'activity') await Team.buildInitialRegimen();
      if (leavingKey === 'nutrition') await Team.buildInitialMealPlan();
    }
    Team.stepIndex++;
    Team.typedMode = false;
    Team.renderIntro();
  },

  // Real, testable reordering: asks which of the 4 specialists is
  // most relevant to what this person actually said they want, so
  // the most relevant voice speaks first instead of a fixed,
  // goal-blind sequence. Falls back to the original STEPS order
  // (unchanged) on any failure \u2014 malformed response, missing
  // goal, network failure \u2014 never leaves the array broken.
  DEFAULT_SPECIALIST_ORDER: ['sleep', 'stress', 'activity', 'nutrition'],

  async reorderSpecialistsByGoal() {
    const profile = Team.loadProfile();
    const goalText = profile?.drSage?.goal;
    if (!goalText || !goalText.trim()) return; // no goal given, keep default order

    const specialistSteps = Team.STEPS.slice(1, 5);
    document.getElementById('next-btn').textContent = 'Building your team\u2026';

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You rank which health specialists are most relevant to what someone said they want, so the most relevant voice speaks to them first instead of a random order. Respond with ONLY valid JSON, no markdown.',
          messages: [{ role: 'user', content: `This person's stated goal: "${goalText.trim()}"\n\nRank these four specialists from most to least relevant to THIS specific goal: sleep (Sleep Coach), stress (Mindfulness Coach), activity (Exercise Coach), nutrition (Nutrition Coach). Respond ONLY with JSON: {"order": ["key1","key2","key3","key4"]} using each of these exact keys exactly once: sleep, stress, activity, nutrition.` }],
          max_tokens: 100,
        }),
      });
      if (!res.ok) return;
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      const validKeys = new Set(Team.DEFAULT_SPECIALIST_ORDER);
      const order = Array.isArray(parsed.order) ? parsed.order.filter(function(k) { return validKeys.has(k); }) : [];
      const uniqueOrder = order.filter(function(k, i) { return order.indexOf(k) === i; });

      // Must be a genuine, complete permutation of all 4 \u2014 anything
      // else (missing a key, duplicates, garbage) is treated as a
      // failure and the original order is kept, not guessed at.
      if (uniqueOrder.length !== 4) return;

      const stepsByKey = {};
      specialistSteps.forEach(function(s) { stepsByKey[s.key] = s; });
      const reordered = uniqueOrder.map(function(k) { return stepsByKey[k]; });
      Team.STEPS.splice(1, 4, reordered[0], reordered[1], reordered[2], reordered[3]);
    } catch (e) {
      // AI unavailable or malformed response \u2014 keep the original
      // order, never crash the onboarding flow over this.
    }
  },

      if (!res.ok) return;
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      if (!parsed.weekGoal || !Array.isArray(parsed.days) || !parsed.days.length) return;

      const newPlan = {
        weekGoal: parsed.weekGoal,
        days: parsed.days.slice(0, 5).map(function(d) {
          return {
            day: String(d.day || '').slice(0, 40),
            name: String(d.name || '').slice(0, 80),
            ingredients: Array.isArray(d.ingredients) ? d.ingredients.slice(0, 8).map(function(i) { return String(i).slice(0, 60); }) : [],
            done: false,
          };
        }).filter(function(d) { return d.day && d.name; }),
        coordinatedWithRegimen,
        createdDate: Team.todayKey(),
      };
      if (!newPlan.days.length) return;
      localStorage.setItem('sh_basil_mealplans', JSON.stringify([newPlan]));
    } catch (e) {
      // Non-fatal \u2014 they can build one manually from meal-plan.html later.
    }
  },

  // ── FINAL AFFIRMATION ───────────────────────────────────────
  // Real commitment device, not decoration: research on
  // behavior-change consistently shows articulating a personal
  // commitment (spoken or written, in the person's own words)
  // measurably improves follow-through versus just moving on
  // silently. Three real phases: (1) Dr. Sage's genuine initial
  // read on everything actually gathered \u2014 not ring data yet,
  // just the rich conversational input from onboarding itself;
  // (2) an explicit confirmation tap, not implied by just
  // continuing; (3) their own promise, in their own words, same
  // voice-first/typed-fallback pattern as everywhere else \u2014
  // deliberately the same "reflect their real words back" idea
  // already proven in the 3-strike affirmation gate, just at the
  // start of the relationship instead of a recovery moment.

  gatherOnboardingSummary() {
    const profile = Team.loadProfile();
    const lines = [];
    const d = profile.drSage || {};
    if (d.goal) lines.push(`Their stated goal: "${d.goal}"`);
    if (d.pastObstacle) lines.push(`What's gotten in the way before: "${d.pastObstacle}"`);
    const s = profile.sleep || {};
    if (s.bedtime || s.struggle) lines.push(`Sleep: bedtime "${s.bedtime || '?'}", biggest struggle "${s.struggle || '?'}"`);
    const st = profile.stress || {};
    if (st.stressors || st.manifestation) lines.push(`Stress: mainly from "${st.stressors || '?'}", shows up as "${st.manifestation || '?'}"`);
    const a = profile.activity || {};
    if (a.current || a.goal) lines.push(`Activity: currently "${a.current || '?'}", goal "${a.goal || '?'}"`);
    const n = profile.nutrition || {};
    if (n.restrictions || n.hardest) lines.push(`Nutrition: restrictions "${n.restrictions || '?'}", hardest part "${n.hardest || '?'}"`);
    return lines.join('\n');
  },

  PLAN_DOMAINS: {
    sleep: { name: 'Willow', title: 'Sleep Coach', color: 'linear-gradient(145deg,#98A5DE,#4C5AA0)', storageKey: 'sh_willow_sleepplans' },
    stress: { name: 'Lotus', title: 'Mindfulness Coach', color: 'linear-gradient(145deg,#CBA8D6,#7A5589)', storageKey: 'sh_lotus_mindfulnessplans' },
    activity: { name: 'Hawthorn', title: 'Exercise Coach', color: 'linear-gradient(145deg,#E6A183,#A85936)', storageKey: 'sh_hawthorn_regimens' },
    nutrition: { name: 'Basil', title: 'Nutrition Coach', color: 'linear-gradient(145deg,#B6D68A,#6B8F45)', storageKey: 'sh_basil_mealplans' },
  },

  // Reads each specialist's REAL, already-persisted plan \u2014 the
  // exact same one built at their step-end, the exact same one
  // their real page (sleep-plan.html, mindfulness-plan.html,
  // regimen.html, meal-plan.html) would show. Nothing generated
  // fresh here, nothing thrown away after \u2014 what you see in this
  // walkthrough is what's actually waiting for you later.
  readRealPlan(domain) {
    const info = Team.PLAN_DOMAINS[domain];
    try {
      const history = JSON.parse(localStorage.getItem(info.storageKey) || '[]');
      if (!history.length) return null;
      return { domain, name: info.name, title: info.title, color: info.color, plan: history[history.length - 1] };
    } catch (e) {
      return null;
    }
  },

  // Real visual presentation, not text bullets \u2014 a horizontal
  // weekly grid for the three specialists whose real plans are
  // genuinely day-by-day (Lotus, Hawthorn, Basil), and a visual
  // checklist for Willow, whose real plan is daily HABITS that
  // apply every day, not day-specific items \u2014 forcing her into a
  // day-grid would misrepresent what her plan actually is.
  dayGrid(cards) {
    return `<div style="display:flex; gap:7px; overflow-x:auto; padding:2px 0 6px;">${cards.map(c => `
      <div style="flex-shrink:0; width:82px; background:rgba(243,239,230,0.05); border:1px solid rgba(243,239,230,0.08); border-radius:10px; padding:8px 7px;">

    const profile = Team.loadProfile();

    const name = rawName && rawName.trim() ? rawName.trim() : null;

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: `You are ${p.name}, ${p.title}. You just built this real plan for someone and now you're talking them through it directly \u2014 not reading the plan back to them, actually walking them through your real thinking and what matters most about it. Be direct and confident. NOT a licensed clinician. Never diagnose, never claim certainty about outcomes, never invent anything beyond the real plan you built. If someone expresses thoughts of self-harm, suicide, or being in crisis, do not continue as a normal conversation \u2014 gently acknowledge what they shared and clearly encourage them to reach out to a crisis line or someone they trust right now. Plain text only, natural spoken tone, 2-4 sentences.`,
          messages: [{ role: 'user', content: `Here is the real plan you just built:\n${planText}${name ? `\n\nCall them ${name}.` : ''}\n\nTalk them through it \u2014 what you were thinking, what matters most to actually do. Don't just restate it as a list.` }],

        }),
      });

      Team.planConversationHistory.push({ role: 'specialist', content: text });

      Team.planConversationHistory.push({ role: 'specialist', content: `Here's what I built for you \u2014 take a look, and ask me anything about it.` });

    status.textContent = '';

  async sendPlanConversationMessage(domain) {
    const p = Team.currentRealPlans.find(pl => pl.domain === domain);
    const input = document.getElementById('plan-chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    Team.planConversationHistory.push({ role: 'user', content: text });
    Team.renderPlanChatMessages();

    // Real safety net, independent of whatever the AI is about
    // to say \u2014 same deterministic check as lotus-chat.html.
    if (Team.checkForCrisisLanguage(text)) {
      Team.planConversationHistory.push({ role: 'crisis', content: '' });
      Team.renderPlanChatMessages();
    }

    const status = document.getElementById('plan-chat-status');
    status.textContent = `${p.name} is thinking\u2026`;

    const planText = JSON.stringify(p.plan);
    const messages = Team.planConversationHistory
      .filter(m => m.role === 'user' || m.role === 'specialist')
      .map(m => ({ role: m.role === 'specialist' ? 'assistant' : 'user', content: m.content }));

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: `You are ${p.name}, ${p.title}, discussing the real plan you already built with this person: ${planText}\n\nBe direct and confident. NOT a licensed clinician. Never diagnose, never claim certainty about outcomes, never invent anything beyond this real plan. If someone expresses thoughts of self-harm, suicide, or being in crisis, do not continue as a normal conversation \u2014 gently acknowledge what they shared and clearly encourage them to reach out to a crisis line or someone they trust right now. Plain text only, natural spoken tone.`,
          messages,
          max_tokens: 250,
        }),
      });
      const data = await res.json();
      const reply = (res.ok && data.content?.[0]?.text) ? data.content[0].text.trim() : "I'm not able to respond right now \u2014 try again in a moment.";
      Team.planConversationHistory.push({ role: 'specialist', content: reply });
      Team.renderPlanChatMessages();
    } catch (e) {
      Team.planConversationHistory.push({ role: 'specialist', content: "I'm not able to respond right now \u2014 try again in a moment." });
      Team.renderPlanChatMessages();
    }
    status.textContent = '';
  },


  // ── FOLLOW-UP DATE + NOTIFICATION PERMISSION ────────────────
  // The follow-up date is real \u2014 it's the exact same 7-day
  // cadence the weekly report already runs on, just calculated
  // and shown here for the first time as part of the plan itself.
  //
  // The permission request is genuinely real too \u2014 this calls
  // the actual browser Notification API and records what the
  // person actually said. But being fully honest about what this
  // does and doesn't mean: granting permission here does NOT by
  // itself mean a notification will ever arrive. Actually
  // delivering one while the app is closed needs a service
  // worker, a push subscription stored server-side, and a
  // scheduled server-side trigger \u2014 none of which exist yet.
  // This records real, honest consent, ready for that
  // infrastructure whenever it gets built \u2014 it does not fake
  // having it already.
  renderFollowUpDate() {
    const followUpDate = new Date(Date.now() + 7 * 86400000);
    const dateLabel = followUpDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    const profile = Team.loadProfile();
    profile.drSage = profile.drSage || {};
    profile.drSage.nextFollowUpDate = followUpDate.toISOString();
    Team.saveProfile(profile);

    const card = document.getElementById('card-area');
    card.innerHTML = `
      <div class="member-title" style="margin-bottom:16px;">Your first check-in</div>
      <div class="intro-text" style="margin-bottom:6px;">${dateLabel}</div>
      <div style="font-size:13px; color:#8C9689; margin-bottom:24px; max-width:280px;">That's part of the plan, not an afterthought \u2014 the team wants to actually see how this week went, not just hand you steps and disappear.</div>
      <button id="notif-permission-btn" style="width:100%; padding:15px; border-radius:14px; border:none; background:#8FB596; color:#0D130F; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; margin-bottom:10px;">Let me know when it's time</button>
      <button id="notif-skip-btn" style="width:100%; padding:13px; border-radius:14px; border:1px solid rgba(243,239,230,0.18); background:transparent; color:#8C9689; font-size:14px; font-family:inherit; cursor:pointer;">I'll check back myself</button>
    `;

    document.getElementById('notif-permission-btn').addEventListener('click', async function() {
      let outcome = 'unsupported';
      if ('Notification' in window) {
        try {
          outcome = await Notification.requestPermission();
        } catch (e) {
          outcome = 'error';
        }
      }
      const p = Team.loadProfile();
      p.drSage.notificationPermission = outcome;
      Team.saveProfile(p);
      Team.renderPromiseCapture();
    });

    document.getElementById('notif-skip-btn').addEventListener('click', function() {
      const p = Team.loadProfile();
      p.drSage.notificationPermission = 'declined';
      Team.saveProfile(p);
      Team.renderPromiseCapture();
    });

  renderPromiseCapture() {
    const card = document.getElementById('card-area');
    card.innerHTML = `
      <div class="member-title" style="margin-bottom:16px;">One last thing</div>
      <div class="intro-text" style="margin-bottom:20px;">In your own words \u2014 what are you actually committing to this week?</div>
      <button class="mic-btn" id="promise-mic-btn">\u{1F3A4}</button>
      <div class="mic-status" id="promise-status">Tap to speak, or type below</div>
      <div class="transcript-preview" id="promise-preview"></div>
      <textarea id="promise-text" placeholder="Type your promise\u2026" style="width:100%; min-height:60px; background:rgba(243,239,230,0.06); border:1px solid rgba(243,239,230,0.14); border-radius:10px; padding:10px; color:#F3EFE6; font-family:inherit; font-size:13px; margin:12px 0;"></textarea>
      <button id="promise-submit-btn" style="width:100%; padding:15px; border-radius:14px; border:none; background:#8FB596; color:#0D130F; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;" disabled>I promise</button>
    `;

    const textArea = document.getElementById('promise-text');
    const submitBtn = document.getElementById('promise-submit-btn');
    textArea.addEventListener('input', () => { submitBtn.disabled = !textArea.value.trim(); });

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
      document.getElementById('promise-mic-btn').addEventListener('click', () => {
        const status = document.getElementById('promise-status');
        status.textContent = 'Listening\u2026';
        const rec = new SpeechRec();
        rec.continuous = false; rec.interimResults = false; rec.lang = 'en-US';
        rec.onresult = (e) => {
          const transcript = e.results[0][0].transcript;
          document.getElementById('promise-preview').textContent = transcript;
          textArea.value = transcript;
          submitBtn.disabled = false;
          status.textContent = 'Got it';
        };
        rec.onerror = () => { status.textContent = 'Didn\u2019t catch that \u2014 try typing'; };
        rec.start();
      });
    } else {
      document.getElementById('promise-mic-btn').disabled = true;
      document.getElementById('promise-status').textContent = 'Voice not available \u2014 type below';
    }

    submitBtn.addEventListener('click', () => {
      const promiseText = textArea.value.trim();
      if (!promiseText) return;
      const profile = Team.loadProfile();
      profile.drSage = profile.drSage || {};
      profile.drSage.promise = promiseText;
      Team.saveProfile(profile);
      Team.renderDone();
    });
  },

  renderDone() {
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('nav-row').style.display = 'none';
    document.getElementById('progress-track').style.display = 'none';
    const done = document.getElementById('done-screen');
    done.style.display = 'flex';
    document.getElementById('done-team-row').innerHTML = Team.STEPS.map(function(s) {
      return '<div class="mini-av" style="background:' + s.color + ';">' + s.name[0] + '</div>';
    }).join('');
  },

  // ── DIRECT-TALK MODE ──────────────────────────────────────────
  // Entered via team.html?talk=sleep|stress|activity|nutrition|drsage
  // from a dashboard button, bypassing the full onboarding walk
  // entirely. Still needs its own tap-to-begin gate (same browser
  // audio-autoplay restriction as normal onboarding), just themed
  // to the one specialist instead of the whole team.
  directTalkMode: false,

  setupDirectTalkGate(talk) {
    const stepKey = talk === 'drsage' ? 'drSage' : talk;
    const step = Team.STEPS.find(function(s) { return s.key === stepKey; }) || Team.STEPS[0];
    const gate = document.getElementById('start-gate');
    gate.innerHTML =
      '<div style="width:72px;height:72px;border-radius:50%;background:' + step.color + ';margin-bottom:24px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#F3EFE6;">' + step.name[0] + '</div>' +
      '<div style="font-size:22px;font-weight:700;margin-bottom:10px;">Talk to ' + step.name + '</div>' +
      '<div style="font-size:14.5px;color:#8C9689;line-height:1.5;max-width:280px;margin-bottom:32px;">' + step.name + ' speaks out loud \u2014 your browser needs one tap first before any audio can play.</div>' +
      '<button id="start-gate-btn" style="width:100%;max-width:280px;padding:16px;border-radius:14px;border:none;background:#8FB596;color:#0D130F;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;">Begin</button>';

    document.getElementById('start-gate-btn').addEventListener('click', function() {
      gate.style.display = 'none';
      document.getElementById('card-area').style.display = 'flex';
      if (talk === 'drsage') {
        Team.openDrSageGeneralChat();
        return;
      }
      const plan = Team.readRealPlan(talk);
      if (plan) {
        Team.currentRealPlans = [plan];
        Team.openPlanConversation(talk);
      } else {
        Team.renderNoPlanYet(step.name);
      }
    });
  },

  renderNoPlanYet(name) {
    document.getElementById('card-area').innerHTML =
      '<div style="text-align:center;width:100%;">' +
      '<div class="member-title" style="margin-bottom:16px;">' + name + '</div>' +
      '<div class="intro-text" style="margin-bottom:24px;">You haven\u2019t built a real plan with ' + name + ' yet \u2014 that happens during onboarding, when they get to know you first. Want to go meet the team now?</div>' +
      '<a href="team.html" style="display:inline-block;padding:16px 28px;border-radius:14px;background:#8FB596;color:#0D130F;font-weight:700;text-decoration:none;">Meet the Team</a>' +
      '<div style="margin-top:18px;"><a href="dashboard.html" style="color:#8C9689;font-size:13px;">\u2039 Back to Dashboard</a></div>' +
      '</div>';
  },

  // ── DR. SAGE GENERAL CHAT ─────────────────────────────────────
  // Not tied to a single domain plan like the other four \u2014 Dr.
  // Sage is the coordinator, so this is a general check-in that
  // has visibility into what the whole team has already built,
  // same crisis safety net as every other real chat surface here.
  async openDrSageGeneralChat() {
    Team.planConversationHistory = [];
    const card = document.getElementById('card-area');
    card.innerHTML =
      '<div style="width:100%;text-align:left;">' +
      '<button id="back-to-plans-btn" style="background:transparent;border:none;color:#8C9689;font-size:13px;margin-bottom:12px;cursor:pointer;padding:0;">\u2039 Dashboard</button>' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">' +
      '<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(145deg,#A9CDAE,#5F7F63);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#F3EFE6;">DS</div>' +
      '<div style="font-size:14px;font-weight:700;">Dr. Sage \u00b7 Holistic Wellness Doctor</div>' +
      '</div>' +
      '<div id="plan-chat-messages" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;max-height:280px;overflow-y:auto;"></div>' +
      '<div id="plan-chat-status" style="font-size:12px;color:#8C9689;margin-bottom:8px;"></div>' +
      '<textarea id="plan-chat-input" placeholder="Ask Dr. Sage anything\u2026" style="width:100%;min-height:44px;background:rgba(243,239,230,0.06);border:1px solid rgba(243,239,230,0.14);border-radius:10px;padding:10px;color:#F3EFE6;font-family:inherit;font-size:13px;margin-bottom:8px;"></textarea>' +
      '<button id="plan-chat-send-btn" style="width:100%;padding:13px;border-radius:12px;border:none;background:#8FB596;color:#0D130F;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;">Send</button>' +
      '</div>';

    document.getElementById('back-to-plans-btn').addEventListener('click', function() { window.location.href = 'dashboard.html'; });
    document.getElementById('plan-chat-send-btn').addEventListener('click', Team.sendDrSageGeneralMessage);

    const status = document.getElementById('plan-chat-status');
    status.textContent = 'Dr. Sage is getting your file\u2026';
    const profile = Team.loadProfile();
    const rawName = profile?.drSage?.preferredName;
    const name = rawName && rawName.trim() ? rawName.trim() : null;
    const goalText = (profile.drSage && profile.drSage.goal && profile.drSage.goal.trim()) || null;
    const realPlans = Object.keys(Team.PLAN_DOMAINS).map(function(d) { return Team.readRealPlan(d); }).filter(function(p) { return p !== null; });
    const plansSummary = realPlans.length ? realPlans.map(function(p) { return p.name + ': "' + p.plan.weekGoal + '"'; }).join('\n') : 'No real specialist plans built yet.';

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You are Dr. Sage, the coordinating holistic wellness doctor. You bring together what the whole team knows about someone into one clear picture, and you flag anything worth a real doctor\u2019s attention. Be direct and confident. You are NOT a licensed medical doctor \u2014 never diagnose, never claim certainty about outcomes, never invent anything you weren\u2019t given. If someone expresses thoughts of self-harm, suicide, or being in crisis, do not continue as a normal conversation \u2014 gently acknowledge what they shared and clearly encourage them to reach out to a crisis line or someone they trust right now. Plain text only, natural spoken tone, 2-4 sentences.',
          messages: [{ role: 'user', content: 'This person just opened a general check-in with you.' + (name ? ' Call them ' + name + '.' : '') + (goalText ? '\n\nWhat they told you they want out of this: "' + goalText + '".' : '') + '\n\nWhat the team has built so far:\n' + plansSummary + '\n\nOpen the conversation naturally \u2014 don\u2019t just list the plans, actually greet them and invite what\u2019s on their mind.' }],
          max_tokens: 200,
        }),
      });
      const data = await res.json();
      const text = (res.ok && data.content && data.content[0] && data.content[0].text) ? data.content[0].text.trim() : 'Hi \u2014 what\u2019s on your mind?';
      Team.planConversationHistory.push({ role: 'specialist', content: text });
      Team.renderPlanChatMessages();
      Team.speak(text, 'drSage', null);
    } catch (e) {
      Team.planConversationHistory.push({ role: 'specialist', content: 'Hi \u2014 what\u2019s on your mind?' });
      Team.renderPlanChatMessages();
    }
    status.textContent = '';
  },

  async sendDrSageGeneralMessage() {
    const input = document.getElementById('plan-chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    Team.planConversationHistory.push({ role: 'user', content: text });
    Team.renderPlanChatMessages();

    if (Team.checkForCrisisLanguage(text)) {
      Team.planConversationHistory.push({ role: 'crisis', content: '' });
      Team.renderPlanChatMessages();
    }

    const status = document.getElementById('plan-chat-status');
    status.textContent = 'Dr. Sage is thinking\u2026';

    const messages = Team.planConversationHistory
      .filter(function(m) { return m.role === 'user' || m.role === 'specialist'; })
      .map(function(m) { return { role: m.role === 'specialist' ? 'assistant' : 'user', content: m.content }; });

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You are Dr. Sage, the coordinating holistic wellness doctor, in an ongoing general check-in conversation. Be direct and confident. NOT a licensed medical doctor \u2014 never diagnose, never claim certainty about outcomes, never invent data you weren\u2019t given. If someone expresses thoughts of self-harm, suicide, or being in crisis, do not continue as a normal conversation \u2014 gently acknowledge what they shared and clearly encourage them to reach out to a crisis line or someone they trust right now. Plain text only, natural spoken tone.',
          messages: messages,
          max_tokens: 250,
        }),
      });
      const data = await res.json();
      const reply = (res.ok && data.content && data.content[0] && data.content[0].text) ? data.content[0].text.trim() : "I'm not able to respond right now \u2014 try again in a moment.";
      Team.planConversationHistory.push({ role: 'specialist', content: reply });
      Team.renderPlanChatMessages();
    } catch (e) {
      Team.planConversationHistory.push({ role: 'specialist', content: "I'm not able to respond right now \u2014 try again in a moment." });
      Team.renderPlanChatMessages();
    }
    status.textContent = '';
  },

  init() {
    const profile = Team.loadProfile();
    Team.flatQuestions().forEach(function(q) {
      if (profile[q.stepKey] && profile[q.stepKey][q.key]) Team.answered[q.stepKey + '.' + q.key] = true;
    });

    document.getElementById('next-btn').addEventListener('click', Team.advance);
    document.getElementById('skip-btn').addEventListener('click', Team.skip);

    // Direct-talk entry from a dashboard button
    // (team.html?talk=sleep|stress|activity|nutrition|drsage)
    // skips the full onboarding walk and its own next/skip nav
    // entirely \u2014 just needs the tap-to-begin audio gate, themed
    // to that one specialist.
    const params = new URLSearchParams(window.location.search);
    const talk = params.get('talk');
    const validTalkKeys = ['sleep', 'stress', 'activity', 'nutrition', 'drsage'];
    if (talk && validTalkKeys.indexOf(talk) !== -1) {
      Team.directTalkMode = true;
      document.getElementById('nav-row').remove();
      Team.setupDirectTalkGate(talk);
      return;
    }

    // The first specialist intro (and its voice) only ever fires
    // from this direct tap, never from page load \u2014 that's the
    // actual fix. A browser will silently block audio triggered
    // by anything other than a real user gesture, which is why
    // Dr. Sage never spoke before this.
    document.getElementById('start-gate-btn').addEventListener('click', function() {
      document.getElementById('start-gate').style.display = 'none';
      document.getElementById('progress-track').style.display = 'flex';
      document.getElementById('card-area').style.display = 'flex';
      document.getElementById('nav-row').style.display = 'flex';
      Team.renderIntro();
    });
  },
};

Team.init();
</script>
</body>
</html>
