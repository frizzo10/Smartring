<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Meet Your Team — myDrSage</title>
<meta name="theme-color" content="#0A0D14">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0A0D14; color: #F4F5F7;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  #progress-track { display: flex; gap: 6px; padding: 18px 20px 0; }
  .progress-dot { flex: 1; height: 3px; border-radius: 3px; background: rgba(255,255,255,0.12); }
  .progress-dot.done { background: var(--accent, #7FC4C9); }
  .progress-dot.active { background: var(--accent, #7FC4C9); opacity: 0.5; }

  #card-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 34px 24px 24px; text-align: center; }

  .avatar-lg {
    width: 84px; height: 84px; border-radius: 50%; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 30px; color: #fff;
    border: 3px solid rgba(255,255,255,0.14); position: relative;
  }
  .avatar-lg.speaking { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.25); } 50% { box-shadow: 0 0 0 12px rgba(255,255,255,0); } }

  .member-name { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .member-title { font-size: 13.5px; color: #9CA3AF; margin-bottom: 22px; }
  .intro-text { font-size: 16px; line-height: 1.55; color: #E4E6EA; margin-bottom: 26px; max-width: 380px; }

  .question-block { width: 100%; max-width: 400px; margin-bottom: 10px; }
  .question-label { font-size: 15px; font-weight: 600; margin-bottom: 18px; }

  .mic-btn {
    width: 84px; height: 84px; border-radius: 50%; border: none; margin: 0 auto 16px;
    background: var(--accent, #7FC4C9); display: flex; align-items: center; justify-content: center;
    font-size: 30px; cursor: pointer;
  }
  .mic-btn.listening { animation: pulse 1s ease-in-out infinite; background: #E86A5C; }
  .mic-status { font-size: 12.5px; color: #6B7280; margin-bottom: 18px; min-height: 16px; }

  .type-toggle { font-size: 12.5px; color: #6B7280; text-decoration: underline; background: none; border: none; cursor: pointer; }

  textarea {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 12px; padding: 12px; color: #fff; font-family: inherit; font-size: 14px;
    min-height: 64px; resize: vertical; margin-bottom: 12px;
  }
  .option-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .option-chip {
    padding: 10px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.04); font-size: 13.5px; color: #E4E6EA; cursor: pointer;
  }
  .option-chip.selected { border-color: var(--accent, #7FC4C9); background: rgba(127,196,201,0.16); color: var(--accent, #7FC4C9); font-weight: 600; }

  .transcript-preview { font-size: 14px; color: var(--accent, #7FC4C9); font-style: italic; margin-bottom: 14px; min-height: 20px; }

  .sensitive-note {
    font-size: 12px; color: #6B7280; line-height: 1.5; margin-bottom: 16px;
    background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 14px;
  }

  .auto-skip-note {
    font-size: 12px; color: #6B7280; background: rgba(255,255,255,0.04); border-radius: 10px;
    padding: 8px 12px; margin-top: 10px; max-width: 380px;
  }

  #nav-row { display: flex; gap: 12px; padding: 0 24px 34px; }
  .btn { flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .btn-primary { background: var(--accent, #7FC4C9); color: #0A0D14; }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-skip { background: transparent; color: #6B7280; flex: 0 0 auto; padding: 15px 18px; }

  #done-screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
  .team-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .mini-av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; }
</style>
</head>
<body>

  <div id="start-gate" style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 30px; text-align:center;">
    <div style="width:72px; height:72px; border-radius:50%; background:linear-gradient(145deg,#5FA5AA,#2F5C60); margin-bottom:24px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; color:#fff;">DS</div>
    <div style="font-size:22px; font-weight:700; margin-bottom:10px;">Meet Your Team</div>
    <div style="font-size:14.5px; color:#9CA3AF; line-height:1.5; max-width:280px; margin-bottom:32px;">Dr. Sage and the team speak out loud as you go \u2014 your browser needs one tap first before any audio can play.</div>
    <button id="start-gate-btn" style="width:100%; max-width:280px; padding:16px; border-radius:14px; border:none; background:#7FC4C9; color:#0A0D14; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;">Begin</button>
  </div>

  <div id="progress-track" style="display:none;"></div>
  <div id="card-area" style="display:none;"></div>
  <div id="nav-row" style="display:none;">
    <button class="btn btn-skip" id="skip-btn">Skip</button>
    <button class="btn btn-primary" id="next-btn">Continue</button>
  </div>

  <div id="done-screen">
    <div class="team-row" id="done-team-row"></div>
    <h2 style="font-size:22px; margin-bottom:10px;">Your team's ready.</h2>
    <p style="color:#9CA3AF; font-size:14.5px; max-width:320px; line-height:1.5; margin-bottom:28px;">Everything you shared gets folded into how Willow, Lotus, Hawthorn, and Basil actually think about your data — not just kept on file.</p>
    <button class="btn btn-primary" style="max-width:220px;" onclick="window.location.href='scores.html'">Go to Scores</button>
  </div>

<script>
const Team = {
  PROFILE_KEY: 'sh_team_profile',

  todayKey() {
    return new Date().toISOString().slice(0, 10);
  },

  STEPS: [
    {
      key: 'drSage', name: 'Dr. Sage', title: 'Holistic Wellness Doctor',
      color: 'linear-gradient(145deg,#5FA5AA,#2F5C60)', accent: '#7FC4C9', voiceKey: 'drSage',
      intro: "I'm Dr. Sage. I will be your leader, but rest assured I have specialists monitoring every facet of your health. Let's take a couple of minutes to get acquainted, and then I want you to meet the team \u2014 I'll chat with you again once you're through.",
      questions: [
        { key: 'preferredName', label: 'What would you like to be called?', type: 'text' },
        { key: 'goal', label: "What's the main thing you're hoping to get out of this?", type: 'text' },
        { key: 'medicalHistory', label: 'Any diagnosed health conditions I should know about?', type: 'text', optional: true,
          sensitiveNote: 'Totally optional. This helps me know what to pay closer attention to \u2014 it\u2019s never used to diagnose anything.' },
        { key: 'familyHistory', label: 'Any family history of things like heart disease, diabetes, or similar?', type: 'text', optional: true,
          sensitiveNote: 'Also optional. Same idea \u2014 context for your team, not a medical record.' },
        { key: 'pastObstacle', label: "What's gotten in the way of this before, if anything?", type: 'text' },
      ],
    },
    {
      key: 'sleep', name: 'Willow', title: 'Sleep Coach',
      color: 'linear-gradient(145deg,#6B7DC4,#45559A)', accent: '#9AACE8', voiceKey: 'sleep',
      intro: "{greeting}I'm Willow, your sleep coach. Getting a good night's rest is my only job, and most of the time, the most important one.",
      questions: [
        { key: 'bedtime', label: 'What time do you usually try to go to bed?', type: 'text' },
        { key: 'struggle', label: "What's your biggest sleep struggle?", type: 'options',
          options: ['Falling asleep', 'Staying asleep', 'Waking too early', "Not feeling rested"] },
        { key: 'waketime', label: 'And what time do you usually wake up?', type: 'text' },
        { key: 'caffeine', label: "What does your caffeine intake look like, and when's your last cup usually?", type: 'text' },
      ],
    },
    {
      key: 'stress', name: 'Lotus', title: 'Mindfulness Coach',
      color: 'linear-gradient(145deg,#B692D0,#8560A8)', accent: '#D0AAEE', voiceKey: 'stress',
      intro: "{greeting}I'm Lotus, a true practitioner of yoga. Think of me as a spiritual guide through the everyday stresses of life. I promise to help take the edge off.",
      questions: [
        { key: 'experience', label: 'Any experience with meditation or yoga?', type: 'options',
          options: ['None', 'A little', 'Regular practice', 'Very experienced'] },
        { key: 'stressors', label: 'What tends to stress you out most?', type: 'text' },
        { key: 'manifestation', label: 'When stress hits, how does it usually show up \u2014 racing thoughts, physical tension, trouble sleeping, something else?', type: 'text' },
        { key: 'whatHelped', label: "Has anything actually helped before, even a little?", type: 'text' },
      ],
    },
    {
      key: 'activity', name: 'Hawthorn', title: 'Exercise Coach',
      color: 'linear-gradient(145deg,#EC8E56,#C4622A)', accent: '#F2A579', voiceKey: 'activity',
      intro: "{greeting}I'm Hawthorn, your exercise guru. I will build a plan regardless of whether you are an athlete or novice. No matter your age, I will get you moving and improving.",
      questions: [
        { key: 'current', label: 'What does exercise currently look like for you?', type: 'text' },
        { key: 'goal', label: "What's one fitness goal you have right now?", type: 'text' },
        { key: 'limitations', label: 'Any injuries or physical limitations I should build around?', type: 'text', optional: true,
          sensitiveNote: 'Optional, but genuinely important \u2014 I\u2019ll never suggest something that works against an injury I know about.' },
        { key: 'equipment', label: 'What equipment or space do you actually have access to?', type: 'text' },
      ],
    },
    {
      key: 'nutrition', name: 'Basil', title: 'Nutrition Coach',
      color: 'linear-gradient(145deg,#82BD82,#558A55)', accent: '#9FD49F', voiceKey: 'nutrition',
      intro: "{greeting}I'm Basil. I am all about food and nutrition. I know what you put in your body counts as much as anything. I will help along the way to a healthier you.",
      questions: [
        { key: 'restrictions', label: 'Any dietary preferences or restrictions?', type: 'text' },
        { key: 'hardest', label: "What's the hardest part of eating well for you?", type: 'text' },
        { key: 'pattern', label: 'How many meals do you typically eat in a day, and do you tend to snack?', type: 'text' },
        { key: 'cookingFor', label: 'Are you cooking just for yourself, or for others too?', type: 'text' },
      ],
    },
    {
      // Dr. Sage again, closing the loop \u2014 same key namespace is
      // deliberately avoided ('drSageClosing' not 'drSage') so this
      // never collides with his opening step's saved profile answers.
      // voiceKey stays 'drSage' so TTS still uses his real voice.
      key: 'drSageClosing', name: 'Dr. Sage', title: 'Holistic Wellness Doctor',
      color: 'linear-gradient(145deg,#5FA5AA,#2F5C60)', accent: '#7FC4C9', voiceKey: 'drSage',
      intro: "{greeting}That's the team. Willow, Lotus, Hawthorn, and Basil are all watching now, and everything you just shared is already helping them do their job. I'll be checking in as your reports come together \u2014 talk soon.",
      questions: [],
    },
  ],

  flatQuestions() {
    const flat = [];
    Team.STEPS.forEach(step => {
      step.questions.forEach(q => flat.push({ stepKey: step.key, ...q }));
    });
    return flat;
  },

  stepIndex: 0,
  questionIndexInStep: -1,
  answered: {},
  speechSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
  typedMode: false,
  currentTranscript: '',

  loadProfile() {
    try { return JSON.parse(localStorage.getItem(Team.PROFILE_KEY) || '{}'); }
    catch (e) { return {}; }
  },

  saveProfile(profile) {
    try { localStorage.setItem(Team.PROFILE_KEY, JSON.stringify(profile)); }
    catch (e) { /* non-critical */ }
  },

  saveAnswer(stepKey, qKey, value) {
    if (!value || !String(value).trim()) return;
    const profile = Team.loadProfile();
    profile[stepKey] = profile[stepKey] || {};
    profile[stepKey][qKey] = value;
    Team.saveProfile(profile);
    Team.answered[stepKey + '.' + qKey] = true;
  },

  async speak(text, voiceKey, avatarEl) {
    if (!text || !text.trim()) return;
    try {
      const res = await fetch('/.netlify/functions/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text.trim(), voiceKey }),
      });
      if (!res.ok) return;
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      if (avatarEl) avatarEl.classList.add('speaking');
      audio.addEventListener('ended', () => {
        URL.revokeObjectURL(url);
        if (avatarEl) avatarEl.classList.remove('speaking');
      });
      await audio.play();
    } catch (e) { /* spoken intro is a nice-to-have, never a blocker */ }
  },

  startListening(onResult, onError) {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) { onError('not_supported'); return null; }
    const rec = new SpeechRec();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-US';
    rec.onresult = (e) => onResult(e.results[0][0].transcript);
    rec.onerror = (e) => onError(e.error);
    rec.start();
    return rec;
  },

  async checkOverlap(justAnsweredLabel, justAnsweredValue) {
    const remaining = Team.flatQuestions().filter(function(q) {
      return q.type === 'text' && !Team.answered[q.stepKey + '.' + q.key];
    });
    if (!remaining.length) return {};

    const questionList = remaining.map(function(q) { return q.stepKey + '.' + q.key + ': "' + q.label + '"'; }).join('\n');
    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You detect when someone\u2019s answer to one question already contains a real answer to OTHER pending questions, so they never get asked twice. Only mark a question covered if the answer genuinely, specifically addresses it \u2014 not just loosely related. Never invent an answer that wasn\u2019t actually said. Respond with ONLY valid JSON, no markdown.',
          messages: [{ role: 'user', content: 'They were just asked: "' + justAnsweredLabel + '"\nThey answered: "' + justAnsweredValue + '"\n\nHere are other pending questions:\n' + questionList + '\n\nDoes their answer above ALSO genuinely answer any of these? Respond ONLY with JSON: {"covered": [{"key": "stepKey.questionKey", "extractedAnswer": "the answer, drawn only from what they actually said"}]} \u2014 empty array if none.' }],
          max_tokens: 300,
        }),
      });
      if (!res.ok) return {};
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      const result = {};
      (parsed.covered || []).forEach(function(c) {
        const parts = String(c.key || '').split('.');
        const stepKey = parts[0], qKey = parts[1];
        if (stepKey && qKey && c.extractedAnswer) result[c.key] = { stepKey: stepKey, qKey: qKey, value: c.extractedAnswer };
      });
      return result;
    } catch (e) {
      return {};
    }
  },

  renderProgress() {
    const track = document.getElementById('progress-track');
    track.innerHTML = Team.STEPS.map(function(s, i) {
      const cls = i < Team.stepIndex ? 'done' : (i === Team.stepIndex ? 'active' : '');
      return '<div class="progress-dot ' + cls + '"></div>';
    }).join('');
  },

  currentStep() { return Team.STEPS[Team.stepIndex]; },

  nextUnansweredQuestionIndex(step, fromIndex) {
    for (let i = fromIndex; i < step.questions.length; i++) {
      const q = step.questions[i];
      if (!Team.answered[step.key + '.' + q.key]) return i;
    }
    return -1;
  },

  renderIntro() {
    const step = Team.currentStep();
    if (!step) { Team.renderFinalAffirmation(); return; }
    document.documentElement.style.setProperty('--accent', step.accent);
    Team.renderProgress();
    Team.questionIndexInStep = -1;

    const initials = step.name[0];
    const personalizedIntro = Team.personalize(step.intro);
    document.getElementById('card-area').innerHTML =
      '<div class="avatar-lg" id="speaking-avatar" style="background:' + step.color + ';">' + initials + '</div>' +
      '<div class="member-name">' + step.name + '</div>' +
      '<div class="member-title">' + step.title + '</div>' +
      '<div class="intro-text">' + personalizedIntro + '</div>';
    document.getElementById('next-btn').textContent = 'Continue';
    document.getElementById('next-btn').disabled = false;

    Team.speak(personalizedIntro, step.voiceKey, document.getElementById('speaking-avatar'));
  },

  // Every specialist after Dr. Sage's own step can genuinely
  // greet by name, since he collects it first. Dr. Sage's own
  // OPENING line can't use this \u2014 the name isn't known yet when
  // it plays, since asking for it IS his first question.
  personalize(text) {
    const profile = Team.loadProfile();
    const name = profile?.drSage?.preferredName;
    const greeting = name && name.trim() ? name.trim() + ', ' : '';
    return text.replace('{greeting}', greeting);
  },

  renderQuestion() {
    const step = Team.currentStep();
    const q = step.questions[Team.questionIndexInStep];
    document.documentElement.style.setProperty('--accent', step.accent);

    const profile = Team.loadProfile();
    const existing = (profile[step.key] && profile[step.key][q.key]) || '';

    if (q.type === 'options') {
      const chips = q.options.map(function(opt) {
        const selected = existing === opt ? 'selected' : '';
        return '<div class="option-chip ' + selected + '" data-value="' + opt + '">' + opt + '</div>';
      }).join('');
      document.getElementById('card-area').innerHTML =
        '<div class="member-title" style="margin-bottom:20px;">' + step.name + '</div>' +
        '<div class="question-block"><div class="question-label">' + q.label + '</div>' +
        '<div class="option-row" id="option-row">' + chips + '</div></div>';
      document.querySelectorAll('.option-chip').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('.option-chip').forEach(function(c) { c.classList.remove('selected'); });
          el.classList.add('selected');
          Team.saveAnswer(step.key, q.key, el.dataset.value);
          document.getElementById('next-btn').disabled = false;
        });
      });
      document.getElementById('next-btn').disabled = !existing;
      document.getElementById('next-btn').textContent = 'Continue';
      return;
    }

    const micOrType = Team.typedMode
      ? '<textarea id="text-input" placeholder="Type your answer\u2026">' + existing + '</textarea>' +
        '<button class="type-toggle" id="mode-toggle">Use voice instead</button>'
      : '<button class="mic-btn" id="mic-btn">' + (Team.speechSupported ? '\u{1F3A4}' : '\u2328\uFE0F') + '</button>' +
        '<div class="mic-status" id="mic-status">' + (Team.speechSupported ? 'Tap to answer' : 'Voice not available on this device') + '</div>' +
        '<div class="transcript-preview" id="transcript-preview">' + existing + '</div>' +
        '<button class="type-toggle" id="mode-toggle">Type instead</button>';

    const sensitiveNoteHtml = q.sensitiveNote ? '<div class="sensitive-note">' + q.sensitiveNote + '</div>' : '';

    document.getElementById('card-area').innerHTML =
      '<div class="member-title" style="margin-bottom:20px;">' + step.name + '</div>' +
      '<div class="question-block"><div class="question-label">' + q.label + '</div>' +
      sensitiveNoteHtml + micOrType + '<div id="auto-skip-area"></div></div>';

    document.getElementById('mode-toggle').addEventListener('click', function() {
      Team.typedMode = !Team.typedMode;
      Team.renderQuestion();
    });

    if (Team.typedMode) {
      const ta = document.getElementById('text-input');
      ta.addEventListener('input', function() {
        Team.currentTranscript = ta.value;
        Team.saveAnswer(step.key, q.key, ta.value);
        document.getElementById('next-btn').disabled = q.optional ? false : !ta.value.trim();
      });
      document.getElementById('next-btn').disabled = q.optional ? false : !existing;
    } else if (Team.speechSupported) {
      document.getElementById('mic-btn').addEventListener('click', function() { Team.handleMicTap(step, q); });
      document.getElementById('next-btn').disabled = q.optional ? false : !existing;
    } else {
      document.getElementById('next-btn').disabled = q.optional ? false : true;
    }

    document.getElementById('next-btn').textContent = 'Continue';
  },

  async handleMicTap(step, q) {
    const btn = document.getElementById('mic-btn');
    const status = document.getElementById('mic-status');
    btn.classList.add('listening');
    status.textContent = 'Listening\u2026';

    Team.startListening(
      async function(transcript) {
        btn.classList.remove('listening');
        status.textContent = 'Got it';
        document.getElementById('transcript-preview').textContent = transcript;
        Team.currentTranscript = transcript;
        Team.saveAnswer(step.key, q.key, transcript);
        document.getElementById('next-btn').disabled = false;

        if (q.type === 'text') {
          const covered = await Team.checkOverlap(q.label, transcript);
          const keys = Object.keys(covered);
          if (keys.length) {
            keys.forEach(function(k) {
              const c = covered[k];
              Team.saveAnswer(c.stepKey, c.qKey, c.value);
            });
            const area = document.getElementById('auto-skip-area');
            if (area) area.innerHTML = '<div class="auto-skip-note">That also covered ' + keys.length + ' other question' + (keys.length > 1 ? 's' : '') + ' \u2014 you won\u2019t be asked ' + (keys.length > 1 ? 'those' : 'that') + ' again.</div>';
          }
        }
      },
      function(err) {
        btn.classList.remove('listening');
        status.textContent = err === 'not_supported' ? 'Voice not available \u2014 try typing' : 'Didn\u2019t catch that \u2014 try again';
      }
    );
  },

  async advance() {
    const step = Team.currentStep();
    if (!step) return;

    if (Team.questionIndexInStep === -1) {
      const next = Team.nextUnansweredQuestionIndex(step, 0);
      if (next === -1) { await Team.nextStep(); return; }
      Team.questionIndexInStep = next;
      Team.renderQuestion();
      return;
    }

    const next = Team.nextUnansweredQuestionIndex(step, Team.questionIndexInStep + 1);
    if (next === -1) { await Team.nextStep(); return; }
    Team.questionIndexInStep = next;
    Team.renderQuestion();
  },

  async nextStep() {
    // Leaving Dr. Sage's opening step is the one moment we know
    // the real stated goal but haven't yet decided who speaks
    // next \u2014 reorder the 4 specialists by relevance to it here,
    // once, before rendering the next intro. Never happens again
    // for later transitions (stepIndex > 0), and never blocks the
    // flow if it fails \u2014 falls back to the original order.
    if (Team.stepIndex === 0) {
      await Team.reorderSpecialistsByGoal();
    } else {
      // Hawthorn and Basil each need to walk away from their own
      // step with a real, immediately usable deliverable \u2014 not
      // wait for a separate page visit. Built from what's
      // independent of ring data (stated preferences and goals);
      // real ring data arriving later VALIDATES and refines these
      // plans (see regimen.html/meals.html's real-adherence and
      // real-nutrition-trend logic) rather than gating them.
      // Checked by KEY, not a fixed step index, since the team
      // order is now dynamic \u2014 Hawthorn or Basil could be in any
      // position depending on the person's stated goal.
      const leavingKey = Team.currentStep().key;
      if (leavingKey === 'activity') await Team.buildInitialRegimen();
      if (leavingKey === 'nutrition') await Team.buildInitialMealPlan();
    }
    Team.stepIndex++;
    Team.typedMode = false;
    Team.renderIntro();
  },

  // Real, testable reordering: asks which of the 4 specialists is
  // most relevant to what this person actually said they want, so
  // the most relevant voice speaks first instead of a fixed,
  // goal-blind sequence. Falls back to the original STEPS order
  // (unchanged) on any failure \u2014 malformed response, missing
  // goal, network failure \u2014 never leaves the array broken.
  DEFAULT_SPECIALIST_ORDER: ['sleep', 'stress', 'activity', 'nutrition'],

  async reorderSpecialistsByGoal() {
    const profile = Team.loadProfile();
    const goalText = profile?.drSage?.goal;
    if (!goalText || !goalText.trim()) return; // no goal given, keep default order

    const specialistSteps = Team.STEPS.slice(1, 5);
    document.getElementById('next-btn').textContent = 'Building your team\u2026';

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You rank which health specialists are most relevant to what someone said they want, so the most relevant voice speaks to them first instead of a random order. Respond with ONLY valid JSON, no markdown.',
          messages: [{ role: 'user', content: `This person's stated goal: "${goalText.trim()}"\n\nRank these four specialists from most to least relevant to THIS specific goal: sleep (Sleep Coach), stress (Mindfulness Coach), activity (Exercise Coach), nutrition (Nutrition Coach). Respond ONLY with JSON: {"order": ["key1","key2","key3","key4"]} using each of these exact keys exactly once: sleep, stress, activity, nutrition.` }],
          max_tokens: 100,
        }),
      });
      if (!res.ok) return;
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      const validKeys = new Set(Team.DEFAULT_SPECIALIST_ORDER);
      const order = Array.isArray(parsed.order) ? parsed.order.filter(function(k) { return validKeys.has(k); }) : [];
      const uniqueOrder = order.filter(function(k, i) { return order.indexOf(k) === i; });

      // Must be a genuine, complete permutation of all 4 \u2014 anything
      // else (missing a key, duplicates, garbage) is treated as a
      // failure and the original order is kept, not guessed at.
      if (uniqueOrder.length !== 4) return;

      const stepsByKey = {};
      specialistSteps.forEach(function(s) { stepsByKey[s.key] = s; });
      const reordered = uniqueOrder.map(function(k) { return stepsByKey[k]; });
      Team.STEPS.splice(1, 4, reordered[0], reordered[1], reordered[2], reordered[3]);
    } catch (e) {
      // AI unavailable or malformed response \u2014 keep the original
      // order, never crash the onboarding flow over this.
    }
  },

  skip() { return Team.advance(); },

  // ── INITIAL PLANS (independent of ring data) ───────────────
  // Hawthorn and Basil each need something real and executable
  // the moment onboarding finishes \u2014 not a placeholder, not a
  // wait-for-later-page-visit. Built purely from what they just
  // told these specialists (current level/preferences + goal).
  // Real ring data arriving afterward VALIDATES and refines these
  // (regimen.html factors in real adherence + readiness on later
  // rebuilds; meals.html factors in real logged nutrition trend)
  // \u2014 the ring is the feedback loop, not the prerequisite to
  // having a real plan on day one. Both are non-fatal on failure:
  // the person can always build one manually later from
  // regimen.html or meals.html if this doesn't succeed.

  async buildInitialRegimen() {
    const existing = JSON.parse(localStorage.getItem('sh_hawthorn_regimens') || '[]');
    if (existing.length) return; // never silently overwrite a plan that already exists

    const profile = Team.loadProfile();
    const activityProfile = profile.activity;
    if (!activityProfile || (!activityProfile.current && !activityProfile.goal)) return; // nothing real to build from

    document.getElementById('next-btn').textContent = 'Hawthorn is building your plan\u2026';

    const userMessage = `This person told you, when you first met: "${activityProfile.current || 'not specified'}" is what exercise currently looks like for them, and their goal is: "${activityProfile.goal || 'not specified'}".\n\nNo ring data exists yet \u2014 this is day one. Build a real, structured 3-day regimen for this week based purely on what they've just told you. Once real activity data starts coming in, you'll refine this week to week \u2014 but they need something real and executable starting today, not a placeholder. Say it directly. Use real, named, honest bodyweight or simple-equipment exercises \u2014 nothing requiring gear you have no evidence they own. Respond ONLY with valid JSON, no markdown: {"weekGoal": "1-2 sentences on this week's focus, stated directly and confidently", "days": [{"day": "Day 1", "focus": "e.g. Full body", "exercises": [{"name": "exercise name", "detail": "sets/reps or duration, appropriate to their level"}]}, ...2-3 days]}`;

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You are Hawthorn, an exercise coach who builds real training regimens from real data. Be direct and confident \u2014 tell them what to do, don\u2019t hedge on the plan itself. You are NOT a licensed doctor or physical therapist \u2014 you are a coach. You NEVER diagnose, NEVER claim certainty about outcomes, and you scale difficulty honestly to what the person actually told you about their experience \u2014 a stated novice never gets an athlete\u2019s program with easier-sounding labels slapped on it. You NEVER invent data you weren\u2019t given. Respond with ONLY the requested JSON, nothing else.',
          messages: [{ role: 'user', content: userMessage }],
          max_tokens: 500,
        }),
      });
      if (!res.ok) return;
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      if (!parsed.weekGoal || !Array.isArray(parsed.days) || !parsed.days.length) return;

      const newRegimen = {
        weekGoal: parsed.weekGoal,
        days: parsed.days.map(function(d) {
          return { day: d.day, focus: d.focus, exercises: (d.exercises || []).map(function(e) { return { name: e.name, detail: e.detail, done: false }; }) };
        }),
        createdDate: Team.todayKey(),
      };
      localStorage.setItem('sh_hawthorn_regimens', JSON.stringify([newRegimen]));
    } catch (e) {
      // Non-fatal \u2014 they can build one manually from regimen.html later.
    }
  },

  async buildInitialMealPlan() {
    const existing = JSON.parse(localStorage.getItem('sh_meal_ideas') || 'null');
    if (existing) return; // never silently overwrite

    const profile = Team.loadProfile();
    const restrictions = profile.nutrition?.restrictions || 'none specified';

    document.getElementById('next-btn').textContent = 'Basil is building your plan\u2026';

    const userMessage = `This person's stated dietary preferences/restrictions: ${restrictions}.\n\nNo real nutrition trend exists yet \u2014 this is day one. Suggest 3 real, specific meals that genuinely support what they're working on, based purely on what they've just told you. Respect their stated restrictions exactly. Once they start logging real meals, you'll refine these suggestions \u2014 but they need something real and usable today, not a placeholder. Respond ONLY with valid JSON, no markdown: {"intro": "1 sentence tying these choices to what's actually going on for them", "meals": [{"name": "specific dish name", "ingredients": ["real ingredient", "..."], "note": "one short line"}, ...3 meals]}`;

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You are Basil, a nutrition coach focused on helping people eat better. Be direct and specific \u2014 real dish names and real ingredients, not vague categories. You are NOT a licensed dietitian \u2014 you are a coach. You NEVER diagnose, NEVER claim a meal will produce a specific health outcome, and you ALWAYS respect stated dietary restrictions exactly. You NEVER invent data you weren\u2019t given. Respond with ONLY the requested JSON, nothing else.',
          messages: [{ role: 'user', content: userMessage }],
          max_tokens: 500,
        }),
      });
      if (!res.ok) return;
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed.meals) || !parsed.meals.length) return;

      localStorage.setItem('sh_meal_ideas', JSON.stringify({ intro: parsed.intro || '', meals: parsed.meals, createdDate: Team.todayKey() }));
    } catch (e) {
      // Non-fatal \u2014 they can build one manually from meals.html later.
    }
  },

  // ── FINAL AFFIRMATION ───────────────────────────────────────
  // Real commitment device, not decoration: research on
  // behavior-change consistently shows articulating a personal
  // commitment (spoken or written, in the person's own words)
  // measurably improves follow-through versus just moving on
  // silently. Three real phases: (1) Dr. Sage's genuine initial
  // read on everything actually gathered \u2014 not ring data yet,
  // just the rich conversational input from onboarding itself;
  // (2) an explicit confirmation tap, not implied by just
  // continuing; (3) their own promise, in their own words, same
  // voice-first/typed-fallback pattern as everywhere else \u2014
  // deliberately the same "reflect their real words back" idea
  // already proven in the 3-strike affirmation gate, just at the
  // start of the relationship instead of a recovery moment.

  gatherOnboardingSummary() {
    const profile = Team.loadProfile();
    const lines = [];
    const d = profile.drSage || {};
    if (d.goal) lines.push(`Their stated goal: "${d.goal}"`);
    if (d.pastObstacle) lines.push(`What's gotten in the way before: "${d.pastObstacle}"`);
    const s = profile.sleep || {};
    if (s.bedtime || s.struggle) lines.push(`Sleep: bedtime "${s.bedtime || '?'}", biggest struggle "${s.struggle || '?'}"`);
    const st = profile.stress || {};
    if (st.stressors || st.manifestation) lines.push(`Stress: mainly from "${st.stressors || '?'}", shows up as "${st.manifestation || '?'}"`);
    const a = profile.activity || {};
    if (a.current || a.goal) lines.push(`Activity: currently "${a.current || '?'}", goal "${a.goal || '?'}"`);
    const n = profile.nutrition || {};
    if (n.restrictions || n.hardest) lines.push(`Nutrition: restrictions "${n.restrictions || '?'}", hardest part "${n.hardest || '?'}"`);
    return lines.join('\n');
  },

  INITIAL_ASSESSMENT_DOMAINS: {
    sleep: { name: 'Willow', title: 'Sleep Coach', voice: 'Willow, a sleep coach', color: 'linear-gradient(145deg,#6B7DC4,#45559A)' },
    stress: { name: 'Lotus', title: 'Mindfulness Coach', voice: 'Lotus, a mindfulness coach and active yoga practitioner', color: 'linear-gradient(145deg,#B692D0,#8560A8)' },
    activity: { name: 'Hawthorn', title: 'Exercise Coach', voice: 'Hawthorn, an exercise coach', color: 'linear-gradient(145deg,#EC8E56,#C4622A)' },
    nutrition: { name: 'Basil', title: 'Nutrition Coach', voice: 'Basil, a nutrition coach', color: 'linear-gradient(145deg,#82BD82,#558A55)' },
  },

  buildDomainOnboardingText(domain, profile) {
    const d = profile[domain] || {};
    const parts = Object.entries(d).filter(([k, v]) => v && String(v).trim()).map(([k, v]) => `${k}: ${v}`);
    return parts.length ? parts.join('; ') : null;
  },

  // Real initial assessment per specialist, using ONLY their own
  // real onboarding answers \u2014 no ring data exists yet, so this
  // is honestly day-one, not a data-backed read. Mirrors the same
  // "each specialist sees only their own domain" architecture
  // already used for real weekly plans, just applied to
  // onboarding content instead of ring history. Honestly returns
  // null if that specialist's questions were skipped \u2014 never
  // invents an assessment from nothing.
  async callInitialSpecialist(domain, profile) {
    const info = Team.INITIAL_ASSESSMENT_DOMAINS[domain];
    const onboardingText = Team.buildDomainOnboardingText(domain, profile);
    if (!onboardingText) return null;

    const userMessage = `This is day one \u2014 no ring data exists yet, only what this person just told you directly: ${onboardingText}\n\nGive your real initial take: one short observation, and one honest starting goal for the two of you to work toward together (not a full plan yet, just a real first direction). Respond ONLY with valid JSON, no markdown: {"note": "1-2 sentence initial observation, in your voice", "suggestedGoal": "one honest, concrete starting goal"}`;

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: `You are ${info.voice}. This is a real person's first day \u2014 you only have what they just told you, no ring data. Be direct and confident, not tentative. You are NOT a licensed clinician. You NEVER diagnose, NEVER claim certainty about outcomes, NEVER invent anything they didn\u2019t actually say. Respond with ONLY the requested JSON, nothing else.`,
          messages: [{ role: 'user', content: userMessage }],
          max_tokens: 200,
        }),
      });
      const data = await res.json();
      if (!res.ok) return null;
      const text = (data.content?.[0]?.text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      if (!parsed.note || !parsed.suggestedGoal) return null;
      return { domain, name: info.name, title: info.title, color: info.color, note: parsed.note, suggestedGoal: parsed.suggestedGoal };
    } catch (e) {
      return null;
    }
  },

  async renderFinalAffirmation() {
    document.getElementById('progress-track').style.display = 'none';
    document.getElementById('nav-row').style.display = 'none';
    const card = document.getElementById('card-area');
    card.style.display = 'flex';
    card.innerHTML = '<div class="intro-text">The team is putting together their first read\u2026</div>';

    const profile = Team.loadProfile();
    const rawName = profile?.drSage?.preferredName;
    const name = rawName && rawName.trim() ? rawName.trim() : null;

    // Each specialist reviews only their own real onboarding
    // answers, independently \u2014 same architecture as a real
    // weekly plan, run here for the first time on day one.
    const results = await Promise.all(
      Object.keys(Team.INITIAL_ASSESSMENT_DOMAINS).map(domain => Team.callInitialSpecialist(domain, profile))
    );
    const realAssessments = results.filter(r => r !== null);

    let framingText = "Here's what the team sees so far \u2014 the real work starts now that they actually know you.";
    if (realAssessments.length) {
      const notesBlock = realAssessments.map(a => `${a.name} (${a.title}): "${a.note}" \u2014 starting goal: "${a.suggestedGoal}"`).join('\n');
      try {
        const res = await fetch('/.netlify/functions/claude', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system: 'You are Dr. Sage, introducing your team\u2019s real first-day read to someone who just finished onboarding \u2014 no ring data exists yet, this is based only on what they told the team directly. Be direct and confident. Never diagnose, never claim certainty, never invent anything beyond what your team actually said. 2-3 sentences, spoken naturally, plain text only.',
            messages: [{ role: 'user', content: `Here's what each specialist who actually got real answers is seeing:\n\n${notesBlock}${name ? `\n\nCall them ${name}.` : ''}\n\nBriefly frame this for them before they see each specialist's real note \u2014 don\u2019t repeat the details, just set up that the team's already forming real first impressions.` }],
            max_tokens: 150,
          }),
        });
        const data = await res.json();
        if (res.ok && data.content?.[0]?.text) framingText = data.content[0].text.trim();
      } catch (e) { /* fallback text above already covers this */ }
    } else {
      framingText = "Most of onboarding got skipped, so there's honestly not much for the team to go on yet \u2014 that's okay, we'll build it from here.";
    }

    const cardsHtml = realAssessments.map(a => `
      <div style="width:100%; background:#131B2E; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:14px; margin-bottom:10px; text-align:left;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
          <div style="width:26px; height:26px; border-radius:50%; background:${a.color}; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff;">${a.name[0]}</div>
          <div style="font-size:13px; font-weight:700;">${a.name} \u00b7 ${a.title}</div>
        </div>
        <div style="font-size:13px; color:#E4E6EA; margin-bottom:6px;">${a.note}</div>
        <div style="font-size:12px; color:#7FC4C9;">Starting goal: ${a.suggestedGoal}</div>
      </div>`).join('');

    card.innerHTML = `
      <div class="avatar-lg" id="report-avatar" style="background:linear-gradient(145deg,#5FA5AA,#2F5C60);">DS</div>
      <div class="member-name">Dr. Sage</div>
      <div class="intro-text" style="margin-bottom:20px;">${framingText}</div>
      ${cardsHtml}
      <div style="font-size:13px; color:#9CA3AF; margin:14px 0 20px;">Is this what you want, and will you actually use it?</div>
      <button id="confirm-yes-btn" style="width:100%; padding:15px; border-radius:14px; border:none; background:#7FC4C9; color:#0A0D14; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; margin-bottom:10px;">Yes, this is what I want</button>
    `;
    Team.speak(framingText, 'drSage', document.getElementById('report-avatar'));
    document.getElementById('confirm-yes-btn').addEventListener('click', Team.renderPromiseCapture);
  },

  renderPromiseCapture() {
    const card = document.getElementById('card-area');
    card.innerHTML = `
      <div class="member-title" style="margin-bottom:16px;">One last thing</div>
      <div class="intro-text" style="margin-bottom:20px;">In your own words \u2014 what are you actually committing to this week?</div>
      <button class="mic-btn" id="promise-mic-btn">\u{1F3A4}</button>
      <div class="mic-status" id="promise-status">Tap to speak, or type below</div>
      <div class="transcript-preview" id="promise-preview"></div>
      <textarea id="promise-text" placeholder="Type your promise\u2026" style="width:100%; min-height:60px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); border-radius:10px; padding:10px; color:#fff; font-family:inherit; font-size:13px; margin:12px 0;"></textarea>
      <button id="promise-submit-btn" style="width:100%; padding:15px; border-radius:14px; border:none; background:#7FC4C9; color:#0A0D14; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;" disabled>I promise</button>
    `;

    const textArea = document.getElementById('promise-text');
    const submitBtn = document.getElementById('promise-submit-btn');
    textArea.addEventListener('input', () => { submitBtn.disabled = !textArea.value.trim(); });

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
      document.getElementById('promise-mic-btn').addEventListener('click', () => {
        const status = document.getElementById('promise-status');
        status.textContent = 'Listening\u2026';
        const rec = new SpeechRec();
        rec.continuous = false; rec.interimResults = false; rec.lang = 'en-US';
        rec.onresult = (e) => {
          const transcript = e.results[0][0].transcript;
          document.getElementById('promise-preview').textContent = transcript;
          textArea.value = transcript;
          submitBtn.disabled = false;
          status.textContent = 'Got it';
        };
        rec.onerror = () => { status.textContent = 'Didn\u2019t catch that \u2014 try typing'; };
        rec.start();
      });
    } else {
      document.getElementById('promise-mic-btn').disabled = true;
      document.getElementById('promise-status').textContent = 'Voice not available \u2014 type below';
    }

    submitBtn.addEventListener('click', () => {
      const promiseText = textArea.value.trim();
      if (!promiseText) return;
      const profile = Team.loadProfile();
      profile.drSage = profile.drSage || {};
      profile.drSage.promise = promiseText;
      Team.saveProfile(profile);
      Team.renderDone();
    });
  },

  renderDone() {
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('nav-row').style.display = 'none';
    document.getElementById('progress-track').style.display = 'none';
    const done = document.getElementById('done-screen');
    done.style.display = 'flex';
    document.getElementById('done-team-row').innerHTML = Team.STEPS.map(function(s) {
      return '<div class="mini-av" style="background:' + s.color + ';">' + s.name[0] + '</div>';
    }).join('');
  },

  init() {
    const profile = Team.loadProfile();
    Team.flatQuestions().forEach(function(q) {
      if (profile[q.stepKey] && profile[q.stepKey][q.key]) Team.answered[q.stepKey + '.' + q.key] = true;
    });

    document.getElementById('next-btn').addEventListener('click', Team.advance);
    document.getElementById('skip-btn').addEventListener('click', Team.skip);

    // The first specialist intro (and its voice) only ever fires
    // from this direct tap, never from page load \u2014 that's the
    // actual fix. A browser will silently block audio triggered
    // by anything other than a real user gesture, which is why
    // Dr. Sage never spoke before this.
    document.getElementById('start-gate-btn').addEventListener('click', function() {
      document.getElementById('start-gate').style.display = 'none';
      document.getElementById('progress-track').style.display = 'flex';
      document.getElementById('card-area').style.display = 'flex';
      document.getElementById('nav-row').style.display = 'flex';
      Team.renderIntro();
    });
  },
};

Team.init();
</script>
</body>
</html>
