<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Your Regimen — Hawthorn</title>
<meta name="theme-color" content="#0D130F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0D130F; color: #F3EFE6; padding: 0 0 40px;
  }
  #top-bar { display: flex; align-items: center; gap: 10px; padding: 18px 20px 0; }
  #back-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid rgba(243,239,230,0.15);
    background: transparent; color: #F3EFE6; font-size: 18px; display: flex;
    align-items: center; justify-content: center;
  }
  #top-bar h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 21px; }
  #content { padding: 20px; }

  .empty-state { background: #161D18; border: 1px solid rgba(243,239,230,0.08); border-radius: 18px; padding: 22px; text-align: center; }
  .empty-state p { color: #8C9689; font-size: 14px; line-height: 1.5; margin-bottom: 16px; }

  #build-btn {
    width: 100%; padding: 15px; border-radius: 14px; border: none;
    background: #D9835C; color: #0D130F; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
  }
  #build-btn:disabled { opacity: 0.5; }
  #error-note { color: #E86A5C; font-size: 13px; margin-top: 12px; display: none; }

  .week-goal {
    background: linear-gradient(145deg, rgba(217,131,92,0.16), rgba(217,131,92,0.04));
    border: 1px solid rgba(217,131,92,0.3); border-radius: 18px; padding: 20px; margin-bottom: 16px;
    font-family: 'Fraunces', serif; font-style: italic; font-size: 16.5px; line-height: 1.5;
  }
  .day-card { background: #161D18; border: 1px solid rgba(243,239,230,0.08); border-radius: 16px; padding: 18px; margin-bottom: 12px; }
  .day-title { font-weight: 700; font-size: 15px; color: #D9835C; }
  .day-focus { font-size: 12.5px; color: #8C9689; margin-bottom: 12px; }
  .exercise-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-top: 1px solid rgba(243,239,230,0.06); font-size: 13.5px; cursor: pointer;
  }
  .exercise-row:first-of-type { border-top: none; }
  .exercise-check {
    width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid rgba(243,239,230,0.35);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px;
  }
  .exercise-row.done .exercise-check { background: #D9835C; border-color: #D9835C; color: #0D130F; }
  .exercise-row.done .exercise-name { text-decoration: line-through; opacity: 0.6; }
  .exercise-name { flex: 1; }
  .exercise-detail { color: #8C9689; }

  .completion-banner { text-align: center; font-size: 13px; color: #8C9689; margin: 4px 0 16px; }
</style>
</head>
<body>

  <div id="top-bar">
    <button id="back-btn" onclick="window.location.href='scores.html'">‹</button>
    <h1>Your Regimen \u2014 Hawthorn</h1>
  </div>

  <div id="content"></div>

<script>
const Regimen = {
  KEY: 'sh_hawthorn_regimens',

  loadHistory() {
    try { return JSON.parse(localStorage.getItem(Regimen.KEY) || '[]'); }
    catch (e) { return []; }
  },

  saveHistory(history) {
    try { localStorage.setItem(Regimen.KEY, JSON.stringify(history)); }
    catch (e) { /* non-critical */ }
  },

  current() {
    const history = Regimen.loadHistory();
    return history.length ? history[history.length - 1] : null;
  },

  summarizePrevious() {
    const history = Regimen.loadHistory();
    if (!history.length) return null;
    const prev = history[history.length - 1];
    let total = 0, done = 0;
    prev.days.forEach(d => d.exercises.forEach(e => { total++; if (e.done) done++; }));
    const pct = total ? Math.round((done / total) * 100) : 0;
    return { weekGoal: prev.weekGoal, completionPct: pct, done, total, createdDate: prev.createdDate };
  },

  toggleExercise(dayIdx, exIdx) {
    const history = Regimen.loadHistory();
    if (!history.length) return;
    const current = history[history.length - 1];
    const ex = current.days[dayIdx]?.exercises[exIdx];
    if (!ex) return;
    ex.done = !ex.done;
    Regimen.saveHistory(history);
    Regimen.render();
  },

  render() {
    const content = document.getElementById('content');
    const regimen = Regimen.current();

    if (!regimen) {
      content.innerHTML = `
        <div class="empty-state">
          <p>Hawthorn builds a real, structured plan from what you told him during Meet the Team \u2014 not a generic template. Genuinely different for a novice than an athlete.</p>
          <button id="build-btn">Build my regimen</button>
          <div id="error-note"></div>
        </div>`;
      document.getElementById('build-btn').addEventListener('click', Regimen.build);
      return;
    }

    let total = 0, done = 0;
    regimen.days.forEach(d => d.exercises.forEach(e => { total++; if (e.done) done++; }));

    const daysHtml = regimen.days.map((d, dayIdx) => `
      <div class="day-card">
        <div class="day-title">${d.day}</div>
        <div class="day-focus">${d.focus}</div>
        ${d.exercises.map((e, exIdx) => `
          <div class="exercise-row ${e.done ? 'done' : ''}" data-day="${dayIdx}" data-ex="${exIdx}">
            <span class="exercise-check">${e.done ? '\u2713' : ''}</span>
            <span class="exercise-name">${e.name}</span>
            <span class="exercise-detail">${e.detail}</span>
          </div>`).join('')}
      </div>`).join('');

    content.innerHTML = `
      <div class="week-goal">${regimen.weekGoal}</div>
      <div class="completion-banner">${done} of ${total} done this week</div>
      ${daysHtml}
      <button id="build-btn" style="margin-top:8px;">Build next week's regimen</button>
      <div id="error-note"></div>`;

    content.querySelectorAll('.exercise-row').forEach(el => {
      el.addEventListener('click', () => Regimen.toggleExercise(Number(el.dataset.day), Number(el.dataset.ex)));
    });
    document.getElementById('build-btn').addEventListener('click', Regimen.build);
  },

  async build() {
    const btn = document.getElementById('build-btn');
    const err = document.getElementById('error-note');
    btn.disabled = true;
    btn.textContent = 'Hawthorn is building it\u2026';
    err.style.display = 'none';

    let profile;
    try { profile = JSON.parse(localStorage.getItem('sh_team_profile') || '{}'); }
    catch (e) { profile = {}; }
    const activityProfile = profile.activity;

    if (!activityProfile || (!activityProfile.current && !activityProfile.goal)) {
      err.textContent = 'Hawthorn needs to know your starting point first \u2014 answer his questions in Meet the Team.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Build my regimen';
      return;
    }

    let snapshot;
    try { snapshot = JSON.parse(localStorage.getItem('sh_ring_latest') || '{}'); }
    catch (e) { snapshot = {}; }

    const activityHist = (snapshot.activityHistory || []).filter(a => a.totalSteps != null);
    let trendText = 'No real step trend synced yet \u2014 base this on their stated starting point only, and say so.';
    if (activityHist.length >= 2) {
      const sorted = [...activityHist].sort((a, b) => a.date.localeCompare(b.date));
      const latest = sorted[sorted.length - 1];
      const prior = sorted.slice(0, -1);
      const avgPrior = Math.round(prior.reduce((s, a) => s + a.totalSteps, 0) / prior.length);
      trendText = `Real recent step data: ${latest.totalSteps} steps most recent day, averaging ${avgPrior}/day prior.`;
    }

    // Real TODAY readiness, not just activity history \u2014 the gap
    // this closes. A low-recovery week and a high-recovery week
    // should not produce the same regimen. Uses the same real HRV
    // and sleep data scores.js already computes from, just read
    // directly here since this page has no dependency on scores.js
    // loading first.
    let readinessText = 'No real recovery/sleep signal available yet \u2014 do not assume either direction.';
    const hrvHistory = (snapshot.hrvHistory || []).filter(h => h.rmssd != null);
    const sleep = snapshot.sleep;
    const readinessParts = [];
    if (hrvHistory.length >= 2) {
      const latest = hrvHistory[hrvHistory.length - 1];
      const prior = hrvHistory.slice(0, -1).map(h => h.rmssd);
      const avgPrior = prior.reduce((a, b) => a + b, 0) / prior.length;
      const pctVsBaseline = Math.round(((latest.rmssd - avgPrior) / avgPrior) * 100);
      readinessParts.push(`Resting-check trend is ${pctVsBaseline > 0 ? '+' : ''}${pctVsBaseline}% vs their own recent baseline`);
    }
    if (sleep && sleep.asleepMin) {
      readinessParts.push(`slept ${Math.round(sleep.asleepMin / 60 * 10) / 10} hrs last night`);
    }
    if (readinessParts.length) {
      readinessText = `Real readiness signal: ${readinessParts.join(', ')}. If this looks like a genuinely low-recovery or short-sleep state, this week should be lighter, not heavier \u2014 if it looks strong, this is a real chance to push. Don't invent certainty either way beyond what's given here.`;
    }

    const prevSummary = Regimen.summarizePrevious();
    const historyText = prevSummary
      ? `Last week's regimen was: "${prevSummary.weekGoal}" \u2014 they completed ${prevSummary.done} of ${prevSummary.total} exercises (${prevSummary.completionPct}%). ${prevSummary.completionPct >= 70 ? 'They largely followed through \u2014 consider a real progression, not a repeat.' : prevSummary.completionPct <= 30 ? 'They struggled to follow it \u2014 this week should be simpler and more achievable, not more ambitious.' : 'Partial follow-through \u2014 keep this week realistic given that.'}`
      : 'This is their first regimen \u2014 no prior week to build on yet.';

    const preferredName = profile.drSage?.preferredName;
    const nameBlock = preferredName && preferredName.trim() ? `\n\nCall them ${preferredName.trim()} \u2014 that's what they asked to be called.` : '';
    const userMessage = `This person told you, when you first met: "${activityProfile.current || 'not specified'}" is what exercise currently looks like for them, and their goal is: "${activityProfile.goal || 'not specified'}".${nameBlock}\n\n${trendText}\n\n${readinessText}\n\n${historyText}\n\nBuild a real, structured 3-day regimen for this week, appropriate to their actual stated experience, genuinely responsive to how last week went if there was one, AND genuinely responsive to their real current readiness \u2014 not the same intensity regardless of how their body is actually doing right now. Say it directly \u2014 tell them what to do, don't hedge. Use real, named, honest bodyweight or simple-equipment exercises \u2014 nothing requiring gear you have no evidence they own. Respond ONLY with valid JSON, no markdown: {"weekGoal": "1-2 sentences on this week's focus, stated directly and confidently, referencing last week's real follow-through and today's real readiness if either is available", "days": [{"day": "Day 1", "focus": "e.g. Full body", "exercises": [{"name": "exercise name", "detail": "sets/reps or duration, appropriate to their level"}]}, ...2-3 days]}`;

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You are Hawthorn, an exercise coach who builds real training regimens from real data. Be direct and confident \u2014 tell them what to do, don\u2019t hedge on the plan itself. You are NOT a licensed doctor or physical therapist \u2014 you are a coach. You NEVER diagnose, NEVER claim certainty about outcomes, and you scale difficulty honestly to what the person actually told you about their experience \u2014 a stated novice never gets an athlete\u2019s program with easier-sounding labels slapped on it. If given real data about how last week went, you genuinely adjust \u2014 progress it if they followed through, simplify it if they didn\u2019t, rather than repeating the same plan regardless. You NEVER invent data you weren\u2019t given. Respond with ONLY the requested JSON, nothing else.',
          messages: [{ role: 'user', content: userMessage }],
          max_tokens: 500,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      const text = (data.content?.[0]?.text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      if (!parsed.weekGoal || !Array.isArray(parsed.days) || !parsed.days.length) throw new Error('Invalid response shape');

      const newRegimen = {
        weekGoal: parsed.weekGoal,
        days: parsed.days.map(d => ({
          day: d.day, focus: d.focus,
          exercises: (d.exercises || []).map(e => ({ name: e.name, detail: e.detail, done: false })),
        })),
        createdDate: new Date().toISOString().slice(0, 10),
      };
      const history = Regimen.loadHistory();
      history.push(newRegimen);
      Regimen.saveHistory(history.slice(-10));
      Regimen.render();
    } catch (e) {
      err.textContent = 'Couldn\u2019t build a valid regimen right now \u2014 try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Build my regimen';
    }
  },
};

Regimen.render();
</script>
</body>
</html>
