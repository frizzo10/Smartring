<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0D130F; color: #F3EFE6; padding: 0 0 40px; }
  #top-bar { display: flex; align-items: center; gap: 10px; padding: 18px 20px; }
  #back-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid rgba(243,239,230,0.15); background: transparent; color: #F3EFE6; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  #top-bar h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 21px; }
  #content { padding: 0 20px; }
  .empty-state { background: #161D18; border: 1px solid rgba(243,239,230,0.08); border-radius: 18px; padding: 22px; text-align: center; }
  .empty-state p { color: #8C9689; font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
  #build-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: #9FC96B; color: #0D130F; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
  #build-btn:disabled { opacity: 0.5; }
  #error-note { color: #E86A5C; font-size: 13px; margin-top: 12px; display: none; }
  .week-goal { background: linear-gradient(145deg, rgba(159,201,107,0.16), rgba(159,201,107,0.04)); border: 1px solid rgba(159,201,107,0.3); border-radius: 18px; padding: 20px; margin-bottom: 16px; font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; line-height: 1.5; }
  .day-row {
    padding: 0; margin-bottom: 10px; background: #161D18; border: 1px solid rgba(243,239,230,0.08);
    border-radius: 14px; overflow: hidden;
  }
  .recipe-img { width: 100%; height: 140px; object-fit: cover; display: block; background: #1D2620; }
  .recipe-img-placeholder {
    width: 100%; height: 140px; background: #1D2620; display: flex; align-items: center; justify-content: center;
    color: #6B756E; font-size: 11px;
  }
  .day-row-top { display: flex; align-items: flex-start; gap: 12px; padding: 14px; cursor: pointer; }
  .check { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid rgba(243,239,230,0.35); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-top: 2px; }
  .day-row.done .check { background: #9FC96B; border-color: #9FC96B; color: #0D130F; }
  .day-row.done .meal-name { text-decoration: line-through; opacity: 0.6; }
  .day-body { flex: 1; }
  .day-label { font-size: 11px; color: #8C9689; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .meal-name { font-weight: 700; font-size: 13.5px; color: #9FC96B; }
  .meal-ing { font-size: 12px; color: #8C9689; margin-top: 2px; }
  .recipe-toggle { font-size: 11px; color: #9FC96B; margin-top: 6px; cursor: pointer; text-decoration: underline; }
  .recipe-steps {
    display: none; padding: 0 14px 16px 46px; font-size: 12.5px; color: #D6D8D2; line-height: 1.6;
  }
  .recipe-steps.open { display: block; }
  .recipe-steps ol { padding-left: 18px; }
  .recipe-steps li { margin-bottom: 6px; }
  .completion-banner { text-align: center; font-size: 13px; color: #8C9689; margin: 4px 0 16px; }
  .coord-note { font-size: 11.5px; color: #8C9689; margin-bottom: 14px; padding: 10px 12px; background: rgba(243,239,230,0.04); border-radius: 10px; }
  body { padding-bottom: 90px; }
  .bas-action-btn {
    display: block; margin: 12px 20px; text-align: center; padding: 15px; border-radius: 14px; border: none;
    background: #9FC96B; color: #0D130F; font-family: inherit; font-size: 14.5px; font-weight: 700; text-decoration: none;
  }

    padding: 10px 8px 22px;
  }

<body>

  <div style="padding:22px 20px 0;">
    <div style="font-family:'Fraunces',serif;font-weight:500;font-size:26px;color:#F3EFE6;margin-bottom:4px;">Basil</div>

  <div style="margin:24px 20px 0;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#9FC96B;">Your Plan</div>
  <div id="content"></div>

<script>
/* Same proven pattern as Hawthorn's regimen, Willow's sleep plan,
   and Lotus's mindfulness plan -- archive-not-overwrite, real
   tracking, real week-to-week adaptation. Distinct from the
   existing meals.html, which stays as a lighter "quick ideas"
   surface with no tracking; this is the real, followed, updated
   plan version, coordinated with Hawthorn's actual regimen the
   same way meals.html already does. */

const MealPlan = {
  KEY: 'sh_basil_mealplans',

  loadHistory() {
    try { return JSON.parse(localStorage.getItem(MealPlan.KEY) || '[]'); }
    catch (e) { return []; }
  },

  saveHistory(history) {
    try { localStorage.setItem(MealPlan.KEY, JSON.stringify(history.slice(-10))); }
    catch (e) { /* non-critical */ }
  },

  current() {
    const history = MealPlan.loadHistory();
    return history.length ? history[history.length - 1] : null;
  },

  summarizePrevious() {
    const history = MealPlan.loadHistory();
    if (!history.length) return null;
    const prev = history[history.length - 1];
    const total = prev.days.length;
    const done = prev.days.filter(d => d.done).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    return { weekGoal: prev.weekGoal, done, total, pct };
  },

  // Real photo per dish, fetched lazily only when the plan is
  // actually viewed (never at build time \u2014 an unviewed plan
  // shouldn't spend an image-search call), and cached into storage
  // permanently once fetched so the same dish never gets searched
  // twice. Silently leaves the placeholder if the lookup fails or
  // Pexels isn't configured yet \u2014 never blocks the real recipe
  // content above it.
  async fetchDayImages(plan) {
    const history = MealPlan.loadHistory();
    if (!history.length) return;
    const stored = history[history.length - 1];
    let changed = false;

    for (let i = 0; i < plan.days.length; i++) {
      if (plan.days[i].imageUrl) continue;
      try {
        const res = await fetch('/.netlify/functions/get-recipe-image?query=' + encodeURIComponent(plan.days[i].name));
        if (!res.ok) continue;
        const data = await res.json();
        if (!data.url) continue;
        const el = document.getElementById('recipe-img-' + i);
        if (el) {
          const img = document.createElement('img');
          img.className = 'recipe-img';
          img.src = data.url;
          img.alt = plan.days[i].name;
          img.loading = 'lazy';
          el.replaceWith(img);
        }
        if (stored.days[i]) { stored.days[i].imageUrl = data.url; changed = true; }
      } catch (e) { /* placeholder stays, never blocks the recipe itself */ }
    }

    if (changed) MealPlan.saveHistory(history);
  },

  toggleDay(idx) {
    const history = MealPlan.loadHistory();
    if (!history.length) return;
    const current = history[history.length - 1];
    if (!current.days[idx]) return;
    current.days[idx].done = !current.days[idx].done;
    MealPlan.saveHistory(history);
    MealPlan.render();
  },

  render() {
    const content = document.getElementById('content');
    const plan = MealPlan.current();

    if (!plan) {
      content.innerHTML = `
        <div class="empty-state">
          <p>Basil builds a real weekly meal plan \u2014 specific meals, specific days, actually tracked \u2014 not just loose suggestions. For quick one-off ideas without tracking, use Meal Ideas from Scores instead.</p>
          <button id="build-btn">Build my meal plan</button>
          <div id="error-note"></div>
        </div>`;
      document.getElementById('build-btn').addEventListener('click', MealPlan.build);
      return;
    }

    const done = plan.days.filter(d => d.done).length;
    const daysHtml = plan.days.map((d, i) => `
      <div class="day-row ${d.done ? 'done' : ''}" data-idx="${i}">
        ${d.imageUrl
          ? `<img class="recipe-img" id="recipe-img-${i}" src="${d.imageUrl}" alt="${d.name}" loading="lazy">`
          : `<div class="recipe-img-placeholder" id="recipe-img-${i}">Loading a real photo\u2026</div>`}
        <div class="day-row-top" data-check="${i}">
          <div class="check">${d.done ? '\u2713' : ''}</div>
          <div class="day-body">
            <div class="day-label">${d.day}</div>
            <div class="meal-name">${d.name}</div>
            <div class="meal-ing">${d.ingredients.join(', ')}</div>
            ${d.steps && d.steps.length ? `<div class="recipe-toggle" data-toggle="${i}">Show recipe steps</div>` : ''}
          </div>
        </div>
        ${d.steps && d.steps.length ? `<div class="recipe-steps" id="recipe-steps-${i}"><ol>${d.steps.map(s => `<li>${s}</li>`).join('')}</ol></div>` : ''}
      </div>`).join('');

    content.innerHTML = `
      <div class="week-goal">${plan.weekGoal}</div>
      ${plan.coordinatedWithRegimen ? '<div class="coord-note">Coordinated with Hawthorn\u2019s current regimen \u2014 not just your stated preferences.</div>' : ''}
      <div class="completion-banner">${done} of ${plan.days.length} meals made this week</div>
      ${daysHtml}
      <button id="build-btn" style="margin-top:8px;">Build next week's plan</button>
      <div id="error-note"></div>`;

    content.querySelectorAll('[data-check]').forEach(el => {
      el.addEventListener('click', () => MealPlan.toggleDay(Number(el.dataset.check)));
    });
    content.querySelectorAll('[data-toggle]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation(); // don't also toggle done/undone
        document.getElementById('recipe-steps-' + el.dataset.toggle).classList.toggle('open');
      });
    });

    MealPlan.fetchDayImages(plan);
    document.getElementById('build-btn').addEventListener('click', MealPlan.build);
  },

  async build() {
    const btn = document.getElementById('build-btn');
    const err = document.getElementById('error-note');
    btn.disabled = true;
    btn.textContent = 'Basil is building it\u2026';
    err.style.display = 'none';

    let profile;
    try { profile = JSON.parse(localStorage.getItem('sh_team_profile') || '{}'); }
    catch (e) { profile = {}; }
    const nutritionProfile = profile.nutrition;

    if (!nutritionProfile || (!nutritionProfile.restrictions && !nutritionProfile.hardest)) {
      err.textContent = 'Basil needs to know your real preferences first \u2014 answer his questions in Meet the Team.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Build my meal plan';
      return;
    }
    const restrictions = nutritionProfile.restrictions || 'none specified';

    let nutritionLog;
    try { nutritionLog = JSON.parse(localStorage.getItem('sh_nutrition_log') || '{}'); }
    catch (e) { nutritionLog = {}; }
    // A day can hold multiple real logged entries now (one per
    // meal), not just one \u2014 sum each day's real entries first.
    const loggedDays = Object.keys(nutritionLog).sort().slice(-7).map(d => {
      const entries = Array.isArray(nutritionLog[d]) ? nutritionLog[d] : (nutritionLog[d] ? [nutritionLog[d]] : []);
      const sum = key => entries.reduce((s, e) => s + (e[key] || 0), 0);
      return { calories: sum('calories'), protein: sum('protein'), carbs: sum('carbs'), fat: sum('fat') };
    }).filter(d => d.calories > 0);
    let trendText = 'No real nutrition trend logged yet \u2014 base this on their stated preferences only.';
    if (loggedDays.length > 1) {
      const avg = key => Math.round(loggedDays.reduce((s, d) => s + (d[key] || 0), 0) / loggedDays.length);
      trendText = `Their real logged average: ~${avg('calories')} cal, ${avg('protein')}g protein, ${avg('carbs')}g carbs, ${avg('fat')}g fat per day.`;
    }

    let regimenText = 'No current exercise regimen from Hawthorn to coordinate with.';
    let coordinatedWithRegimen = false;
    try {
      const regimens = JSON.parse(localStorage.getItem('sh_hawthorn_regimens') || '[]');
      if (regimens.length) {
        regimenText = `Hawthorn's regimen this week: "${regimens[regimens.length - 1].weekGoal}"`;
        coordinatedWithRegimen = true;
      }
    } catch (e) { /* non-critical */ }

    const prevSummary = MealPlan.summarizePrevious();
    const historyText = prevSummary
      ? `Last week's plan was: "${prevSummary.weekGoal}" \u2014 they made ${prevSummary.done} of ${prevSummary.total} meals (${prevSummary.pct}%). ${prevSummary.pct >= 70 ? 'They largely followed through \u2014 consider genuine variety, not repeats.' : prevSummary.pct <= 30 ? 'They struggled to follow it \u2014 this week should be simpler, less prep-intensive.' : 'Partial follow-through \u2014 keep this week realistic.'}`
      : 'This is their first meal plan \u2014 no prior week to build on yet.';

    const nameProfile = profile.drSage?.preferredName;
    const nameBlock = nameProfile ? `\n\nCall them ${nameProfile}.` : '';

    const userMessage = `This person's stated dietary preferences/restrictions: ${restrictions}.\n\n${trendText}\n\n${regimenText}\n\n${historyText}${nameBlock}\n\nBuild a real weekly meal plan \u2014 all 7 days, each with ONE real, specific, named meal, real ingredients, and real cooking steps (3-5 concrete steps, actually enough to cook it, not vague). Genuinely varied across the week, no repeated meals. Respect their stated restrictions exactly. If Hawthorn's regimen is real, let it inform your choices. Say it directly, don't hedge. Respond ONLY with valid JSON, no markdown: {"weekGoal": "1-2 sentences on this week's focus, stated directly", "days": [{"day": "Monday dinner", "name": "specific dish name", "ingredients": ["real ingredient", "..."], "steps": ["real cooking step", "..."]}, ...all 7 days, Monday through Sunday]}`;

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: 'You are Basil, a nutrition coach focused on helping people eat better. Be direct and specific \u2014 real dish names and real ingredients. You are NOT a licensed dietitian \u2014 you are a coach. You NEVER diagnose, NEVER claim a meal will produce a specific health outcome, and you ALWAYS respect stated dietary restrictions exactly. You NEVER invent data you weren\u2019t given. Respond with ONLY the requested JSON, nothing else.',
          messages: [{ role: 'user', content: userMessage }],
          max_tokens: 2600,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      const text = (data.content?.[0]?.text || '').replace(/```json\s*|```\s*/g, '').trim();
      const parsed = JSON.parse(text);
      if (!parsed.weekGoal || !Array.isArray(parsed.days) || !parsed.days.length) throw new Error('Invalid response shape');

      const newPlan = {
        weekGoal: parsed.weekGoal,
        days: parsed.days.slice(0, 7).map(d => ({
          day: String(d.day || '').slice(0, 40),
          name: String(d.name || '').slice(0, 80),
          ingredients: Array.isArray(d.ingredients) ? d.ingredients.slice(0, 8).map(i => String(i).slice(0, 60)) : [],
          steps: Array.isArray(d.steps) ? d.steps.slice(0, 6).map(s => String(s).slice(0, 200)) : [],
          imageUrl: null, // fetched lazily on render, see MealPlan.fetchDayImages \u2014 not fetched here so an un-viewed plan never spends an image-search call
          done: false,
        })).filter(d => d.day && d.name),
        coordinatedWithRegimen,
        createdDate: new Date().toISOString().slice(0, 10),
      };
      if (!newPlan.days.length) throw new Error('No valid days in response');

      const history = MealPlan.loadHistory();
      history.push(newPlan);
      MealPlan.saveHistory(history);
      MealPlan.render();
    } catch (e) {
      err.textContent = 'Couldn\u2019t build a valid plan right now \u2014 try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Build my meal plan';
    }
  },
};

MealPlan.render();
</script>
